/* ============================================================
   FLOW STEP 5: 规则引擎预审
   ============================================================ */
async function runPrecheck() {
  currentFlowStep = 5;
  addBotMessage("正在运行规则引擎预审…");

  if (isApiConfigured("precheck")) {
    try {
      var result = await callConfiguredApi("precheck", {data:currentOcrData});
      if (result.ok && result.data) { currentPrecheckResult = result.data; showPrecheckResult(currentPrecheckResult); return; }
    } catch(e) {}
  }

  // Deterministic rule engine (NO LLM for rule checks)
  var hitRules = [];
  var allRuleResults = PRECHECK_RULES.map(function(rule){ return rule.check(currentOcrData); });
  allRuleResults.forEach(function(r){ if(r && r.status !== "pass") hitRules.push(r); });

  // Risk score calculation (deterministic, NO LLM)
  var riskScore = 0;
  hitRules.forEach(function(r){
    if (r.status==="block") riskScore += 30;
    else if (r.status==="warning") riskScore += 15;
    else if (r.status==="info") riskScore += 5;
  });
  riskScore = Math.min(riskScore, 100);

  // Conclusion (deterministic, NO LLM)
  var precheckResult, riskLevel;
  var hasBlock = hitRules.some(function(r){return r.status==="block";});
  var hasWarning = hitRules.some(function(r){return r.status==="warning";});
  if (hasBlock) { precheckResult = "拦截"; riskLevel = "high"; }
  else if (hasWarning) { precheckResult = "预警"; riskLevel = "medium"; }
  else { precheckResult = "通过"; riskLevel = "low"; }

  currentPrecheckResult = {
    result: precheckResult,
    risk_level: riskLevel,
    risk_score: riskScore,
    hit_rules: hitRules,
    all_rules: allRuleResults,
    next_actions: getNextActions(precheckResult)
  };
  showPrecheckResult(currentPrecheckResult);
}

function getNextActions(result) {
  if (result==="通过") return [{action_name:"一键提交正式报销",reason:"预审已通过",how_to_do:"点击提交按钮",priority:"低"},{action_name:"暂存草稿",reason:"稍后提交",how_to_do:"点击暂存按钮",priority:"低"}];
  if (result==="预警") return [{action_name:"修改字段",reason:"修改不合规字段",how_to_do:"返回修改字段",priority:"高"},{action_name:"补充附件",reason:"补充缺失附件",how_to_do:"上传缺失附件",priority:"高"},{action_name:"仍然提交并标记风险",reason:"确认风险后提交",how_to_do:"点击提交按钮",priority:"低"}];
  if (result==="拦截") return [{action_name:"修改费用类别",reason:"费用类型不合规",how_to_do:"返回修改字段",priority:"高"},{action_name:"替换发票",reason:"发票存在问题",how_to_do:"重新上传发票",priority:"高"},{action_name:"发起特殊审批",reason:"需要额外审批",how_to_do:"点击特殊审批按钮",priority:"中"},{action_name:"暂存草稿",reason:"稍后处理",how_to_do:"点击暂存按钮",priority:"低"}];
  return [{action_name:"补充字段",reason:"信息不完整",how_to_do:"返回修改字段",priority:"高"},{action_name:"补充附件",reason:"附件缺失",how_to_do:"上传缺失附件",priority:"高"},{action_name:"重新识别",reason:"OCR结果有误",how_to_do:"重新上传发票",priority:"中"},{action_name:"重新预审",reason:"修改后需重新校验",how_to_do:"点击重新预审",priority:"中"}];
}

function showPrecheckResult(result) {
  var card = document.createElement("div");
  card.className = "precheck-card";
  var resultClass = result.result==="通过"?"result-pass":result.result==="预警"?"result-warn":result.result==="拦截"?"result-block":"result-info";
  var riskColor = result.risk_level==="low"?"var(--green)":result.risk_level==="medium"?"var(--yellow)":"var(--red)";
  var riskLabel = {low:"低",medium:"中",high:"高"};

  var html = '<h4>🔍 预审结果</h4>';
  html += '<div class="precheck-summary">';
  html += '<div class="summary-item"><div class="summary-label">结论</div><div class="summary-value '+resultClass+'">'+result.result+'</div></div>';
  html += '<div class="summary-item"><div class="summary-label">风险等级</div><div class="summary-value" style="color:'+riskColor+'">'+(riskLabel[result.risk_level]||result.risk_level)+'</div></div>';
  html += '<div class="summary-item"><div class="summary-label">风险分</div><div class="summary-value" style="color:'+riskColor+'">'+result.risk_score+'</div></div>';
  html += '</div>';

  html += '<div style="overflow-x:auto;"><table class="rule-table"><thead><tr>';
  html += '<th>规则ID</th><th>规则名</th><th>状态</th><th>实际值</th><th>标准值</th><th>差异</th><th>依据</th><th>建议动作</th>';
  html += '</tr></thead><tbody>';
  var allRules = result.all_rules || result.hit_rules || [];
  allRules.forEach(function(r){
    var stClass = r.status==="pass"?"status-pass":r.status==="warning"?"status-remind":r.status==="block"?"status-confirm":"status-edited";
    var stText = r.status==="pass"?"通过":r.status==="warning"?"预警":r.status==="block"?"拦截":"信息";
    html += '<tr><td>'+r.rule_id+'</td><td>'+r.rule_name+'</td>';
    html += '<td><span class="rule-status '+stClass+'">'+stText+'</span></td>';
    html += '<td>'+r.fact+'</td><td>'+r.standard+'</td><td>'+r.gap+'</td>';
    html += '<td>'+r.basis+'</td><td>'+r.required_action+'</td></tr>';
  });
  html += '</tbody></table></div>';
  card.innerHTML = html;

  // AI explain button
  var explainDiv = document.createElement("div");
  explainDiv.style.cssText = "margin-top:12px;";
  var explainBtn = document.createElement("button");
  explainBtn.className = "btn";
  explainBtn.textContent = "AI 解释预审结果";
  explainBtn.onclick = function(){
    explainBtn.disabled = true;
    explainBtn.textContent = "生成中…";
    llmExplainPrecheck(result).then(function(obj){
      var text = typeof obj === "string" ? obj : (obj.summary||"")+"\n\n"+(obj.reason||"")+(obj.risk_explanation?"\n\n风险说明: "+obj.risk_explanation:"")+(obj.next_action&&obj.next_action.length>0?"\n\n下一步: "+obj.next_action.join("、"):"")+(obj.cannot_change?"\n\n("+obj.cannot_change+")":"");
      var explainCard = document.createElement("div");
      explainCard.className = "note-card";
      explainCard.innerHTML = "<h4>💡 AI 预审解释</h4><div style='font-size:13px;line-height:1.7;'>"+simpleMarkdown(text)+"</div><div class='note-mark'>AI 生成内容，请人工确认</div>";
      addBotMessage("", explainCard);
    }).catch(function(e){
      showToast("AI解释生成失败: "+e.message, "error");
      console.error("[AI预审解释失败]", e);
    }).finally(function(){
      explainBtn.textContent = "AI 解释预审结果";
      explainBtn.disabled = false;
    });
  };
  explainDiv.appendChild(explainBtn);
  card.appendChild(explainDiv);

  var bubble = addBotMessage("", card);
  bubble.insertBefore(createStepIndicator(5), bubble.firstChild);
  setTimeout(function(){ showClosureActions(result); }, 300);
}

    else if (actionName==="替换发票") { btn.onclick=function(){triggerUpload();showToast("请上传新发票替换","info");}; }
    else if (actionName==="发起特殊审批") { btn.className="primary"; btn.onclick=function(){initiateSpecialApproval();}; }
    else if (actionName==="补充字段") { btn.onclick=function(){reEditFields();}; }
    else if (actionName==="补充附件") { btn.onclick=function(){showAttachmentUploader();}; }
    else if (actionName==="重新识别") { btn.onclick=function(){currentFlowStep=1;performOCR(currentExpenseType);}; }

    actionsDiv.appendChild(btn);

  card.appendChild(actionsDiv);
  var bubble = addBotMessage("", card);
  bubble.insertBefore(createStepIndicator(6), bubble.firstChild);
}

/* ============================================================
   SEND MESSAGE (chat)
   ============================================================ */
async function sendMessage() {
  var input = document.getElementById("chatInput");
  var text = input.value.trim();
  if (!text) return;
  input.value = "";
  addUserMessage(text);
  pushHistory("user", text);

  if (currentFlowStep === 0) {
    if (text==="取消"||text==="重置") { resetFlow(); addBotMessage("流程已重置，您可以重新开始。"); return; }
    var isQuestion = /政策|制度|标准|限额|规定|怎么|如何|能不能|可以|要求|流程|区别|范围|比例|额度|咨询|问/.test(text);
    var type = null;
    if (!isQuestion) {
      if (text.indexOf("上传")>=0||text.indexOf("发票")>=0) type = "差旅交通费";
      if (text.indexOf("住宿")>=0 && (text.indexOf("报销")>=0||text.indexOf("申请")>=0||text.indexOf("提交")>=0)) type = "住宿费";
      if ((text.indexOf("招待")>=0||text.indexOf("客户")>=0) && (text.indexOf("报销")>=0||text.indexOf("申请")>=0)) type = "客户招待费";
      if ((text.indexOf("采购")>=0||text.indexOf("办公")>=0) && (text.indexOf("报销")>=0||text.indexOf("申请")>=0)) type = "办公采购";
      if (text.indexOf("差旅")>=0 && (text.indexOf("报销")>=0||text.indexOf("申请")>=0)) type = "差旅交通费";
      if (text.indexOf("预审")>=0 && text.indexOf("发起")>=0) type = type || "差旅交通费";
    }
    if (type) { startFlow(type); return; }
    var qaResult = await processQuestion(text);
    addBotMessage(simpleMarkdown(qaResult.answer), qaResult.extra);
    pushHistory("assistant", qaResult.answer);
  } else {
    if (text==="取消"||text==="重置") { resetFlow(); addBotMessage("流程已重置，您可以重新开始。"); return; }
    var qaResult = await processQuestion(text);
    addBotMessage(simpleMarkdown(qaResult.answer), qaResult.extra);
    pushHistory("assistant", qaResult.answer);
  }
}

function filterReimbTable() {
  var typeFilter = document.getElementById("filterType").value;
  var statusFilter = document.getElementById("filterStatus").value;
  var dateStart = document.getElementById("filterDateStart").value;
  var dateEnd = document.getElementById("filterDateEnd").value;
  filteredReimbData = allReimbursements.filter(function(r){
    if (typeFilter && r.type !== typeFilter) return false;
    if (statusFilter && r.status !== statusFilter) return false;
    if (dateStart && r.date < dateStart) return false;
    if (dateEnd && r.date > dateEnd) return false;
    return true;
  });
  sortReimbData();
  renderReimbTable();
}

function sortReimbTable(key) {
  if (reimbSortKey === key) reimbSortAsc = !reimbSortAsc;
  else { reimbSortKey = key; reimbSortAsc = true; }
  sortReimbData();
  renderReimbTable();
}

function sortReimbData() {
  filteredReimbData.sort(function(a,b){
    var va=a[reimbSortKey], vb=b[reimbSortKey];
    if (typeof va === "number") return reimbSortAsc ? va-vb : vb-va;
    return reimbSortAsc ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
  });
}

  var body = document.getElementById("reimbBody");

function exportFilteredCSV() {
  if (filteredReimbData.length===0) { showToast("没有可导出的数据","warning"); return; }
  var header = "单号,费用类型,金额,申请日期,状态,风险分,申请人,部门\n";
  var rows = filteredReimbData.map(function(r){
    return [r.id,r.type,r.amount,r.date,r.status,r.riskScore,r.applicant,r.department].join(",");
  }).join("\n");
  var csv = "\uFEFF" + header + rows;
  var blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url; a.download = "报销记录_" + new Date().toISOString().slice(0,10) + ".csv";
  a.click(); URL.revokeObjectURL(url);
  showToast("已导出 " + filteredReimbData.length + " 条记录", "success");
}

  var detail = document.getElementById("feedbackDetail").value.trim();
  if (!type) { showToast("请选择反馈类型","warning"); return; }
  if (!title) { showToast("请填写标题","warning"); return; }
  if (!detail) { showToast("请填写详细描述","warning"); return; }
  showToast("感谢您的反馈！我们会尽快处理。","success");
  document.getElementById("feedbackType").value = "";
  document.getElementById("feedbackTitle").value = "";
  document.getElementById("feedbackDetail").value = "";
}

/* ============================================================
   INIT
   ============================================================ */
function init() {
  updateConfigBtnState();
  filteredReimbData = allReimbursements.slice();

  // 初始化用户选择器
  var userSel = document.getElementById("userSelect");
  MOCK_USERS.forEach(function(u, i) {
    var opt = document.createElement("option");
    opt.value = i;
    opt.textContent = u.name + " · " + u.department + " (" + u.level + ")";
    opt.style.color = "#333";
    userSel.appendChild(opt);
  });

  // Welcome message
  var welcomeHtml = "您好！我是费用报销智能助手，可以帮您：<br><br>" +
    "🔹 <b>智能问答</b>：回答报销制度、流程等问题<br>" +
    "🔹 <b>OCR 识别</b>：上传发票自动识别结构化字段<br>" +
    "🔹 <b>规则预审</b>：自动校验合规性，给出预审结论<br>" +
    "🔹 <b>闭环提交</b>：根据预审结果提供纠错和提交操作<br><br>" +
    "您可以：";
  var quickDiv = document.createElement("div");
  quickDiv.className = "quick-actions";
  ["上传发票开始预审","差旅报销标准","住宿费超标怎么办","招待费需要哪些材料"].forEach(function(q){
    var btn = document.createElement("button");
    btn.className = "quick-btn";
    btn.textContent = q;
    btn.onclick = function(){ document.getElementById("chatInput").value = q; sendMessage(); };
    quickDiv.appendChild(btn);
  });
  addBotMessage(welcomeHtml, quickDiv);

  filterReimbTable();
  document.getElementById("todoBadge").textContent = TODO_LIST.length;
}

loadKnowledgeBases().then(function() { init(); });
</script>
