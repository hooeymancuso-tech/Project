<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>费用报销智能问答及预审助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--primary:#2f6fec;--primary-light:#5a94f4;--primary-dark:#1d4fa8;--sidebar-bg:linear-gradient(180deg,#0c1f3d 0%,#143060 100%);--sidebar-w:240px;--bg:#f4f6fa;--card-bg:#fff;--text:#222;--text-secondary:#666;--border:#e2e8f0;--green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--blue:#3b82f6;--orange:#f97316;--shadow:0 2px 12px rgba(0,0,0,.08);--radius:8px;}
body{font-family:'Microsoft YaHei','PingFang SC','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden;}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--sidebar-bg);color:#fff;display:flex;flex-direction:column;position:relative;z-index:100;transition:transform .3s;}
.sidebar-logo{padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px;}
.sidebar-logo .icon{width:36px;height:36px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.sidebar-logo h1{font-size:15px;font-weight:600;line-height:1.3;}
.sidebar-logo h1 small{display:block;font-size:11px;font-weight:400;opacity:.7;margin-top:2px;}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 20px;cursor:pointer;transition:all .2s;font-size:14px;color:rgba(255,255,255,.7);border-left:3px solid transparent;position:relative;}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff;}
.nav-item.active{background:rgba(47,111,236,.25);color:#fff;border-left-color:var(--primary-light);}
.nav-item .nav-icon{width:20px;text-align:center;font-size:16px;}
.nav-item .badge{position:absolute;right:16px;background:var(--red);color:#fff;font-size:11px;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center;}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.1);font-size:12px;opacity:.6;}
.main{flex:1;display:flex;flex-direction:column;position:relative;overflow:hidden;min-width:0;min-height:0;}
.main-header{height:56px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;}
.main-header h2{font-size:17px;font-weight:600;}
.api-config-btn{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s;position:relative;}
.api-config-btn:hover{border-color:var(--primary);color:var(--primary);}
.api-config-btn.configured{border-color:var(--green);color:var(--green);}
.api-config-btn.configured::after{content:'';position:absolute;top:-2px;right:-2px;width:10px;height:10px;background:var(--green);border-radius:50%;border:2px solid #fff;}
.page-content{flex:1;overflow-y:auto;padding:20px 24px;min-height:0;}
.page{display:none;flex:1;min-height:0;flex-direction:column;overflow:hidden;}
.page.active{display:flex;flex-direction:column;}
.chat-container{display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;}
.chat-messages{flex:1;overflow-y:auto;padding:16px 20px;min-height:0;}
.chat-msg{display:flex;gap:10px;margin-bottom:16px;max-width:820px;}
.chat-msg.bot{align-self:flex-start;}
.chat-msg.user{align-self:flex-end;flex-direction:row-reverse;}
.chat-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.chat-msg.bot .chat-avatar{background:var(--primary);color:#fff;}
.chat-msg.user .chat-avatar{background:#e2e8f0;color:var(--text);}
.chat-bubble{max-width:700px;padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.6;position:relative;}
.chat-msg.bot .chat-bubble{background:#fff;border:1px solid var(--border);border-top-left-radius:2px;box-shadow:var(--shadow);}
.chat-msg.user .chat-bubble{background:var(--primary);color:#fff;border-top-right-radius:2px;}
.chat-input-area{background:#fff;border-top:1px solid var(--border);padding:12px 20px;display:flex;gap:10px;align-items:flex-end;flex-shrink:0;}
.chat-input-area textarea{flex:1;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit;resize:none;min-height:40px;max-height:120px;outline:none;transition:border-color .2s;}
.chat-input-area textarea:focus{border-color:var(--primary);}
.chat-input-area button{height:40px;padding:0 16px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-family:inherit;transition:all .2s;}
.btn-send{background:var(--primary);color:#fff;}
.btn-send:hover{background:var(--primary-dark);}
.btn-upload{background:#f1f5f9;color:var(--text);font-size:16px;width:40px;padding:0;display:flex;align-items:center;justify-content:center;}
.btn-upload:hover{background:#e2e8f0;}
.ocr-card,.attachment-card,.precheck-card,.closure-card,.note-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-top:8px;box-shadow:var(--shadow);}
.ocr-card h4,.attachment-card h4,.precheck-card h4,.closure-card h4,.note-card h4{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.field-layer{margin-bottom:12px;}
.field-layer-title{font-size:13px;font-weight:600;color:var(--primary);margin-bottom:6px;padding:4px 8px;background:#eff6ff;border-radius:4px;}
.field-row{display:flex;align-items:center;gap:8px;padding:5px 8px;font-size:13px;border-bottom:1px solid #f1f5f9;}
.field-row:last-child{border-bottom:none;}
.field-label{width:130px;color:var(--text-secondary);flex-shrink:0;}
.field-value{flex:1;font-weight:500;}
.field-value input{border:1px solid var(--border);border-radius:4px;padding:2px 6px;width:100%;font-size:13px;font-family:inherit;}
.field-value input:focus{border-color:var(--primary);outline:none;}
.field-confidence{width:50px;text-align:center;font-size:12px;font-weight:600;border-radius:4px;padding:2px 4px;}
.conf-high{background:#dcfce7;color:#15803d;}
.conf-mid{background:#fef3c7;color:#b45309;}
.conf-low{background:#fef2f2;color:#dc2626;}
.field-status{width:80px;text-align:center;font-size:11px;padding:2px 6px;border-radius:4px;font-weight:500;}
.status-pass{background:#dcfce7;color:#15803d;}
.status-remind{background:#fef3c7;color:#b45309;}
.status-confirm{background:#fef2f2;color:#dc2626;}
.status-edited{background:#dbeafe;color:#1d4ed8;}
.attach-item{display:flex;align-items:center;gap:8px;padding:8px;font-size:13px;border-bottom:1px solid #f1f5f9;}
.attach-item:last-child{border-bottom:none;}
.attach-name{width:150px;font-weight:500;}
.attach-status{width:70px;text-align:center;font-size:12px;padding:2px 6px;border-radius:4px;}
.attach-required{width:50px;text-align:center;font-size:12px;color:var(--red);}
.attach-reason{flex:1;color:var(--text-secondary);font-size:12px;}
.attach-action{font-size:12px;color:var(--primary);cursor:pointer;white-space:nowrap;}
.attach-action:hover{text-decoration:underline;}
.precheck-summary{display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap;}
.precheck-summary .summary-item{background:#f8fafc;border:1px solid var(--border);border-radius:6px;padding:10px 16px;text-align:center;min-width:100px;}
.precheck-summary .summary-label{font-size:11px;color:var(--text-secondary);margin-bottom:4px;}
.precheck-summary .summary-value{font-size:18px;font-weight:700;}
.result-pass{color:var(--green);}
.result-warn{color:var(--yellow);}
.result-block{color:var(--red);}
.result-info{color:var(--blue);}
.rule-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;}
.rule-table th{background:#f1f5f9;padding:8px 6px;text-align:left;font-weight:600;border:1px solid var(--border);}
.rule-table td{padding:7px 6px;border:1px solid var(--border);vertical-align:top;}
.rule-status{display:inline-block;padding:1px 6px;border-radius:4px;font-size:11px;font-weight:600;}
.closure-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
.closure-actions button{padding:8px 16px;border-radius:6px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:13px;font-family:inherit;transition:all .2s;}
.closure-actions button:hover{background:#f1f5f9;}
.closure-actions button.primary{background:var(--primary);color:#fff;border-color:var(--primary);}
.closure-actions button.primary:hover{background:var(--primary-dark);}
.note-textarea{width:100%;min-height:120px;border:1px solid var(--border);border-radius:6px;padding:10px;font-size:13px;font-family:inherit;resize:vertical;line-height:1.6;}
.note-textarea:focus{border-color:var(--primary);outline:none;}
.note-mark{font-size:11px;color:var(--orange);margin-top:4px;font-style:italic;}
.qa-path{font-size:11px;color:var(--text-secondary);margin-top:6px;padding:6px 10px;background:#f8fafc;border-radius:4px;border-left:3px solid var(--primary);}
.todo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;}
.todo-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow);}
.todo-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.12);transform:translateY(-1px);}
.todo-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.todo-card-title{font-size:14px;font-weight:600;}
.todo-card .status-tag{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;}
.todo-card-body{font-size:13px;color:var(--text-secondary);line-height:1.8;}
.todo-card-footer{margin-top:10px;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text-secondary);}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;display:none;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:#fff;border-radius:12px;width:90%;max-width:700px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-header h3{font-size:16px;font-weight:600;}
.modal-close{width:32px;height:32px;border:none;background:none;font-size:20px;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.modal-close:hover{background:#f1f5f9;}
.modal-body{padding:20px;}
.modal-footer{padding:16px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:4px;color:var(--text-secondary);}
.form-group input,.form-group select,.form-group textarea{width:100%;border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:13px;font-family:inherit;outline:none;transition:border-color .2s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary);}
.btn{padding:8px 18px;border-radius:6px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:13px;font-family:inherit;transition:all .2s;}
.btn:hover{background:#f1f5f9;}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary);}
.btn-primary:hover{background:var(--primary-dark);}
.btn-danger{color:var(--red);border-color:var(--red);}
.btn-danger:hover{background:#fef2f2;}
.reimb-table-wrap{overflow-x:auto;}
.reimb-table{width:100%;border-collapse:collapse;font-size:13px;background:#fff;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
.reimb-table th{background:#f1f5f9;padding:10px 8px;text-align:left;font-weight:600;border-bottom:2px solid var(--border);cursor:pointer;white-space:nowrap;user-select:none;}
.reimb-table th:hover{background:#e2e8f0;}
.reimb-table th .sort-arrow{margin-left:4px;font-size:10px;opacity:.5;}
.reimb-table td{padding:9px 8px;border-bottom:1px solid var(--border);}
.reimb-table tr:hover td{background:#f8fafc;}
.table-filters{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.table-filters input,.table-filters select{border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:13px;font-family:inherit;outline:none;}
.table-filters input:focus,.table-filters select:focus{border-color:var(--primary);}
.arch-page{background:#0a1628;flex:1;padding:30px 20px;color:#fff;overflow-y:auto;min-height:0;}
.arch-title{text-align:center;font-size:20px;font-weight:700;margin-bottom:30px;background:linear-gradient(90deg,#5a94f4,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.arch-rows{display:flex;flex-direction:column;gap:20px;max-width:1100px;margin:0 auto;}
.arch-row{display:flex;align-items:flex-start;gap:12px;}
.arch-row-label{width:80px;flex-shrink:0;font-size:13px;font-weight:700;padding:12px 0;text-align:right;color:var(--primary-light);}
.arch-row-cards{display:flex;flex-wrap:wrap;gap:10px;flex:1;}
.arch-card{background:linear-gradient(135deg,#1a2d50,#0f1f3a);border:1px solid rgba(90,148,244,.3);border-radius:8px;padding:10px 14px;font-size:12px;text-align:center;min-width:90px;transition:all .3s;}
.arch-card:hover{border-color:var(--primary-light);background:linear-gradient(135deg,#1e3560,#132845);transform:translateY(-2px);}
.arch-card .card-icon{font-size:18px;margin-bottom:4px;}
.arch-card .card-label{font-size:11px;opacity:.9;line-height:1.3;}
.arch-arrows{display:flex;justify-content:center;max-width:1100px;margin:0 auto;}
.arch-arrow-line{flex:1;height:20px;position:relative;}
.arch-arrow-line::after{content:'\25BC';position:absolute;bottom:0;left:50%;transform:translateX(-50%);color:rgba(90,148,244,.5);font-size:10px;}
.arch-row.ai .arch-card{border-color:rgba(168,85,247,.4);background:linear-gradient(135deg,#1a1a3d,#150f2e);}
.arch-row.ai .arch-card:hover{border-color:#a855f7;}
.arch-row.backend .arch-card{border-color:rgba(34,197,94,.3);background:linear-gradient(135deg,#0f2a1a,#0a1f12);}
.arch-row.backend .arch-card:hover{border-color:#22c55e;}
.arch-row.infra .arch-card{border-color:rgba(249,115,22,.3);background:linear-gradient(135deg,#2a1a0f,#1f120a);}
.arch-row.infra .arch-card:hover{border-color:#f97316;}
.faq-item{background:#fff;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;}
.faq-q{padding:14px 16px;font-size:14px;font-weight:500;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none;}
.faq-q:hover{background:#f8fafc;}
.faq-q .arrow{transition:transform .2s;font-size:12px;}
.faq-q.open .arrow{transform:rotate(180deg);}
.faq-a{padding:0 16px;max-height:0;overflow:hidden;transition:all .3s;font-size:13px;color:var(--text-secondary);line-height:1.7;}
.faq-a.open{padding:12px 16px;max-height:600px;}
.policy-item{background:#fff;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;}
.policy-header{padding:14px 16px;font-size:14px;font-weight:500;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.policy-header:hover{background:#f8fafc;}
.policy-tag{font-size:10px;background:#fef3c7;color:#b45309;padding:2px 6px;border-radius:4px;margin-left:8px;}
.policy-body{padding:0 16px;max-height:0;overflow:hidden;transition:all .3s;font-size:13px;color:var(--text-secondary);line-height:1.7;}
.policy-body.open{padding:12px 16px;max-height:800px;}
.policy-body ul{padding-left:18px;margin-top:6px;}
.policy-body li{margin-bottom:4px;}
.toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
.toast{padding:12px 20px;border-radius:8px;font-size:13px;color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:toastIn .3s;max-width:400px;}
.toast.success{background:var(--green);}
.toast.error{background:var(--red);}
.toast.warning{background:var(--yellow);color:#333;}
.toast.info{background:var(--primary);}
@keyframes toastIn{from{opacity:0;transform:translateX(40px);}to{opacity:1;transform:translateX(0);}}
.quick-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.quick-btn{padding:6px 14px;border-radius:16px;border:1px solid var(--primary);color:var(--primary);background:#fff;cursor:pointer;font-size:12px;font-family:inherit;transition:all .2s;}
.quick-btn:hover{background:var(--primary);color:#fff;}
.step-indicator{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap;}
.step-dot{padding:4px 10px;border-radius:12px;font-size:11px;background:#e2e8f0;color:var(--text-secondary);}
.step-dot.active{background:var(--primary);color:#fff;}
.step-dot.done{background:var(--green);color:#fff;}
.config-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.config-field label{display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:3px;}
.config-field input{width:100%;border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:13px;font-family:inherit;outline:none;}
.config-field input:focus{border-color:var(--primary);}
.config-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;flex-wrap:wrap;}
.detail-section{margin-bottom:14px;}
.detail-section h5{font-size:13px;font-weight:600;color:var(--primary);margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.detail-row{display:flex;gap:8px;font-size:13px;padding:3px 0;}
.detail-row .dl{width:100px;color:var(--text-secondary);flex-shrink:0;}
.detail-row .dv{font-weight:500;}
@media(max-width:1100px){.sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);z-index:200;}.sidebar.open{transform:translateX(0);}.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150;}.sidebar-overlay.show{display:block;}.menu-toggle{display:flex!important;}}
@media(max-width:720px){.page-content{padding:12px;}.todo-grid{grid-template-columns:1fr;}.table-filters{flex-direction:column;}.arch-row-label{width:50px;font-size:11px;}.arch-card{min-width:70px;padding:8px 10px;}.chat-bubble{max-width:90vw;}.modal{width:95%;max-width:none;}.config-grid{grid-template-columns:1fr;}.field-label{width:100px;font-size:12px;}.field-status{width:60px;font-size:10px;}}
.menu-toggle{display:none;width:36px;height:36px;border:none;background:none;font-size:20px;cursor:pointer;align-items:center;justify-content:center;}
</style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="icon">💰</div>
    <h1>费用报销助手<small>智能问答 · 预审闭环</small></h1>
  </div>
  <div class="sidebar-nav">
    <div class="nav-item active" data-page="chat" onclick="switchPage('chat')"><span class="nav-icon">💬</span>智能对话</div>
    <div class="nav-item" data-page="todo" onclick="switchPage('todo')"><span class="nav-icon">📋</span>待处理单<span class="badge" id="todoBadge">3</span></div>
    <div class="nav-item" data-page="reimb" onclick="switchPage('reimb')"><span class="nav-icon">📊</span>我的报销</div>
    <div class="nav-item" data-page="arch" onclick="switchPage('arch')"><span class="nav-icon">🏗️</span>产品架构</div>
    <div class="nav-item" data-page="help" onclick="switchPage('help')"><span class="nav-icon">❓</span>帮助反馈</div>
  </div>
  <div class="sidebar-footer">v2.0 · 费用报销智能助手</div>
</div>

<div class="main">
  <div class="main-header">
    <div style="display:flex;align-items:center;gap:10px;">
      <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">☰</button>
      <h2 id="pageTitle">智能对话</h2>
    </div>
    <button class="api-config-btn" id="apiConfigBtn" onclick="openConfigModal()" title="API 配置">⚙</button>
  </div>

  <div class="page active" id="pageChat">
    <div class="chat-container">
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-area">
        <button class="btn-upload" onclick="triggerUpload()" title="上传发票">📎</button>
        <input type="file" id="fileInput" accept="image/*,.pdf" style="display:none" onchange="handleFileUpload(event)">
        <textarea id="chatInput" placeholder="输入报销问题，或上传发票开始预审…" rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
        <button class="btn-send" onclick="sendMessage()">发送</button>
      </div>
    </div>
  </div>

  <div class="page" id="pageTodo">
    <div class="page-content">
      <h3 style="margin-bottom:16px;">待处理单据</h3>
      <div class="todo-grid" id="todoGrid"></div>
    </div>
  </div>

/* ============================================================
   TOAST
   ============================================================ */
function showToast(msg, type) {
  type = type || "info";
  var c = document.getElementById("toastContainer");
  var t = document.createElement("div");
  t.className = "toast " + type;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(function(){ if(t.parentNode) t.parentNode.removeChild(t); }, 3500);
}

/* ============================================================
   API CONFIG FUNCTIONS
   ============================================================ */
function getApiConfig() {
  try { return JSON.parse(localStorage.getItem(CONFIG_KEY)) || {}; } catch(e) { return {}; }
}
function saveApiConfig(cfg) { localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg)); }
function clearApiConfig() { localStorage.removeItem(CONFIG_KEY); }
function isApiConfigured(type) {
  var cfg = getApiConfig();
  if (type === "llm") return !!(cfg.llmBaseUrl && cfg.llmApiKey);
  if (type === "ocr") return !!cfg.ocrUrl;
  if (type === "precheck") return !!cfg.precheckUrl;
  if (type === "embedding") return !!cfg.embeddingUrl;
  if (type === "vectorSearch") return !!cfg.vectorUrl;
  if (type === "rerank") return !!cfg.rerankUrl;
  return false;
}

async function callConfiguredApi(type, payload) {
  var cfg = getApiConfig();
  var url = "";
  if (type === "llm") url = cfg.llmBaseUrl + "/chat/completions";
  else if (type === "ocr") url = cfg.ocrUrl;
  else if (type === "precheck") url = cfg.precheckUrl;
  else if (type === "embedding") url = cfg.embeddingUrl;
  else if (type === "vectorSearch") url = cfg.vectorUrl;
  else if (type === "rerank") url = cfg.rerankUrl;
  if (!url) throw new Error("No URL configured for " + type);
  var headers = { "Content-Type": "application/json" };
  if (type === "llm" && cfg.llmApiKey) headers["Authorization"] = "Bearer " + cfg.llmApiKey;
  try {
    var resp = await fetch(url, { method: "POST", headers: headers, body: JSON.stringify(payload) });
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    var data = await resp.json();
    return { ok: true, data: data };
  } catch(e) {
    showToast("接口不可用，已切换为模拟数据", "warning");
    throw e;
  }
}

async function callLLM(messages, options) {
  var cfg = getApiConfig();
  options = options || {};
  if (cfg.llmBaseUrl && cfg.llmApiKey) {
    try {
      var resp = await callConfiguredApi("llm", {
        model: cfg.llmModel || "gpt-4o-mini",
        messages: messages,
        temperature: options.temperature || 0.3,
        max_tokens: options.max_tokens || 1024
      });
      if (resp.ok && resp.data && resp.data.choices && resp.data.choices[0]) {
        return { ok: true, data: resp.data.choices[0].message.content };
      }
      throw new Error("Invalid LLM response");
    } catch(e) {
      return { ok: false, error: e.message };
    }
  }
  return { ok: false, error: "Not configured" };
}

/* ============================================================
   CONFIG MODAL
   ============================================================ */
function openConfigModal() {
  var cfg = getApiConfig();
  document.getElementById("cfgLlmBaseUrl").value = cfg.llmBaseUrl || "";
  document.getElementById("cfgLlmApiKey").value = cfg.llmApiKey || "";
  document.getElementById("cfgLlmModel").value = cfg.llmModel || "";
  document.getElementById("cfgOcrUrl").value = cfg.ocrUrl || "";
  document.getElementById("cfgPrecheckUrl").value = cfg.precheckUrl || "";
  document.getElementById("cfgEmbeddingUrl").value = cfg.embeddingUrl || "";
  document.getElementById("cfgVectorUrl").value = cfg.vectorUrl || "";
  document.getElementById("cfgRerankUrl").value = cfg.rerankUrl || "";
  document.getElementById("configModal").classList.add("show");
}
function closeConfigModal() { document.getElementById("configModal").classList.remove("show"); }
function saveConfigAction() {
  var cfg = {
    llmBaseUrl: document.getElementById("cfgLlmBaseUrl").value.trim(),
    llmApiKey: document.getElementById("cfgLlmApiKey").value.trim(),
    llmModel: document.getElementById("cfgLlmModel").value.trim(),
    ocrUrl: document.getElementById("cfgOcrUrl").value.trim(),
    precheckUrl: document.getElementById("cfgPrecheckUrl").value.trim(),
    embeddingUrl: document.getElementById("cfgEmbeddingUrl").value.trim(),
    vectorUrl: document.getElementById("cfgVectorUrl").value.trim(),
    rerankUrl: document.getElementById("cfgRerankUrl").value.trim()
  };
  saveApiConfig(cfg);
  updateConfigBtnState();
  showToast("配置已保存", "success");
}
function clearConfigAction() {
  clearApiConfig();
  document.getElementById("cfgLlmBaseUrl").value = "";
  document.getElementById("cfgLlmApiKey").value = "";
  document.getElementById("cfgLlmModel").value = "";
  document.getElementById("cfgOcrUrl").value = "";
  document.getElementById("cfgPrecheckUrl").value = "";
  document.getElementById("cfgEmbeddingUrl").value = "";
  document.getElementById("cfgVectorUrl").value = "";
  document.getElementById("cfgRerankUrl").value = "";
  updateConfigBtnState();
  showToast("配置已清空，已切换为模拟数据", "info");
}
async function testApiConnection() {
  var cfg = getApiConfig();
  if (!cfg.llmBaseUrl) { showToast("请先配置 LLM Base URL", "warning"); return; }
  try {
    var h = cfg.llmApiKey ? { "Authorization": "Bearer " + cfg.llmApiKey } : {};
    var resp = await fetch(cfg.llmBaseUrl + "/models", { headers: h });
    if (resp.ok) showToast("连接成功！", "success");
    else showToast("连接失败: HTTP " + resp.status, "error");
  } catch(e) { showToast("连接失败: " + e.message, "error"); }
}
function updateConfigBtnState() {
  var cfg = getApiConfig();
  var btn = document.getElementById("apiConfigBtn");
  if (cfg.llmBaseUrl || cfg.ocrUrl || cfg.precheckUrl) btn.classList.add("configured");
  else btn.classList.remove("configured");
}

/* ============================================================
   MOCK SIMILARITY (for FAQ matching without Embedding API)
   ============================================================ */
var SYNONYM_DICT = {
  "差旅":["出差","旅行","交通","机票","火车"],"标准":["限额","额度","上限","规定"],
  "住宿":["酒店","宾馆","旅馆"],"招待":["宴请","商务","客户"],
  "发票":["票据","收据"],"报销":["费用","付款"],"审批":["审批","批准","审核"],
  "采购":["购买","办公","买"],"重复":["重复","重号"],"周期":["时间","期限","天数"]
};

function mockSimilarity(q1, q2) {
  q1 = q1.toLowerCase(); q2 = q2.toLowerCase();
  var set1 = new Set(q1.split("")), set2 = new Set(q2.split(""));
  var inter = 0; set1.forEach(function(c){ if(set2.has(c)) inter++; });
  var union = new Set(Array.from(set1).concat(Array.from(set2))).size;
  var charSim = union > 0 ? inter / union : 0;
  var synBoost = 0;
  Object.keys(SYNONYM_DICT).forEach(function(key){
    var syns = SYNONYM_DICT[key];
    var hasInQ1 = syns.some(function(s){ return q1.indexOf(s)>=0; }) || q1.indexOf(key)>=0;
    var hasInQ2 = syns.some(function(s){ return q2.indexOf(s)>=0; }) || q2.indexOf(key)>=0;
    if (hasInQ1 && hasInQ2) synBoost += 0.08;
  });
  return Math.min(charSim + synBoost, 1.0);
}

// 【会调用 LLM】复杂问题意图识别
async function llmRecognizeIntent(query) {
  var result = await callLLM([
    {role:"system",content:"你是报销助手，识别用户问题的意图。返回JSON: {intent:'policy_query'|'process_query'|'precheck_query'|'general', sub_type:'', keywords:[]}"},

  ], {temperature:0.1, max_tokens:256});
  if (result.ok) { try { return JSON.parse(result.data); } catch(e){} }
  // Mock fallback (NO LLM call for this fallback - deterministic)
  if (query.indexOf("标准")>=0||query.indexOf("限额")>=0||query.indexOf("制度")>=0) return {intent:"policy_query",sub_type:"standard",keywords:["标准"]};
  if (query.indexOf("流程")>=0||query.indexOf("怎么")>=0||query.indexOf("如何")>=0) return {intent:"process_query",sub_type:"",keywords:["流程"]};

async function processQuestion(query) {
  // Stage 1: Keyword cache (NO LLM)
  var cacheHit = null;
  for (var i = 0; i < keywordAnswerCache.length; i++) {
    var entry = keywordAnswerCache[i];
    var coverage = 0;
    entry.keywords.forEach(function(kw){ if(query.indexOf(kw)>=0) coverage++; });
    if (coverage / entry.keywords.length >= 0.9) { cacheHit = entry; break; }
  }
  if (cacheHit) return {answer:cacheHit.answer, path:"关键词缓存", usedLLM:false, source:"关键词缓存匹配"};

  // Stage 2: FAQ similarity (NO LLM, use mock similarity if no Embedding API)
  var bestFaq = null, bestSim = 0;
  for (var j = 0; j < faqKnowledgeBase.length; j++) {
    var sim = mockSimilarity(query, faqKnowledgeBase[j].q);
    if (sim > bestSim) { bestSim = sim; bestFaq = faqKnowledgeBase[j]; }
  }
  if (bestSim >= 0.85 && bestFaq) return {answer:bestFaq.a, path:"FAQ匹配 (相似度:"+bestSim.toFixed(2)+")", usedLLM:false, source:"FAQ知识库"};

  // Stage 3: RAG pipeline (intent→rewrite→route→hybrid search→rerank→LLM generate)
  var intent = await llmRecognizeIntent(query);
  var rewritten = await llmRewriteQuery(query, intent);
  var searchResults = [];
  faqKnowledgeBase.forEach(function(faq){
    var s = mockSimilarity(rewritten, faq.q);
    if (s > 0.3) searchResults.push({text:faq.a, source:"FAQ", score:s});
  });
  MOCK_POLICIES.forEach(function(p){
    var s = mockSimilarity(rewritten, p.title);
    if (s > 0.2) searchResults.push({text:p.title+" (示例制度)", source:"制度库", score:s});
  });
  searchResults.sort(function(a,b){ return b.score - a.score; });
  var context = searchResults.slice(0,3).map(function(r){ return "["+r.source+"] "+r.text; }).join("\n");
  if (!context) context = "暂无相关制度信息。（mock 制度条款）";

  var answer = await llmGenerateAnswer(context, query);
  var sources = searchResults.slice(0,3).map(function(r){ return r.source; }).join(", ") || "mock 制度条款";
  return {answer:answer, path:"RAG生成", usedLLM:true, source:sources};
}

function addChatMessage(role, html, extra) {
  var container = document.getElementById("chatMessages");
  var msgDiv = document.createElement("div");
  msgDiv.className = "chat-msg " + role;
  var avatar = document.createElement("div");

  msgDiv.appendChild(avatar);
  msgDiv.appendChild(bubble);
  container.appendChild(msgDiv);
  container.scrollTop = container.scrollHeight;
  return bubble;
}
function addBotMessage(html, extra) { return addChatMessage("bot", html, extra); }
function addUserMessage(html) { addChatMessage("user", html); }

function createStepIndicator(currentStep) {
  var steps = ["单据进入","OCR识别","字段确认","附件检查","规则预审","纠错提交"];
  var div = document.createElement("div");
  div.className = "step-indicator";
  steps.forEach(function(s, i){
    var dot = document.createElement("span");
    dot.className = "step-dot" + (i < currentStep ? " done" : i === currentStep ? " active" : "");
    dot.textContent = (i+1) + "." + s;
    div.appendChild(dot);
  });
  return div;
}

/* ============================================================
   FLOW STEP 1: 单据进入
   ============================================================ */
function startFlow(type) {
  currentFlowStep = 1;
  currentExpenseType = type;
  currentOcrData = null;
  currentPrecheckResult = null;
  var msg = "开始处理 <b>" + type + "</b> 报销单据，正在进行 OCR 识别…";
  var bubble = addBotMessage(msg);
  bubble.insertBefore(createStepIndicator(1), bubble.firstChild);
  setTimeout(function(){ performOCR(type); }, 800);
}

function triggerUpload() { document.getElementById("fileInput").click(); }

function handleFileUpload(event) {
  var file = event.target.files[0];
  if (!file) return;
  addUserMessage("上传了文件: " + file.name);
  var type = "差旅交通费";
  if (file.name.indexOf("住宿")>=0) type = "住宿费";
  else if (file.name.indexOf("招待")>=0||file.name.indexOf("餐饮")>=0) type = "客户招待费";
  else if (file.name.indexOf("采购")>=0||file.name.indexOf("办公")>=0) type = "办公采购";
  startFlow(type);
  event.target.value = "";
}

/* ============================================================
   FLOW STEP 2: OCR + 结构化识别
   ============================================================ */
async function performOCR(type) {
  var data = MOCK_OCR_DATA[type];
  if (!data) { addBotMessage("未找到该费用类型的模拟数据。"); return; }
  if (isApiConfigured("ocr")) {
    try {
      var result = await callConfiguredApi("ocr", {expenseType:type});
      if (result.ok && result.data) data = Object.assign({}, data, result.data);
    } catch(e) {}
  }
  currentOcrData = JSON.parse(JSON.stringify(data));
  currentFlowStep = 2;
  var html = "<b>OCR 识别完成</b>，请确认以下字段信息：";
  var card = createOcrCard(data);
  var bubble = addBotMessage(html, card);
  bubble.insertBefore(createStepIndicator(2), bubble.firstChild);
}

function createOcrCard(data) {
  var card = document.createElement("div");
  card.className = "ocr-card";

  // Layer 1 - 票据基础字段
  card.appendChild(createFieldLayer("📄 票据基础字段", [
    ["invoiceType","发票类型"],["invoiceNumber","发票号码"],["invoiceCode","发票代码"],
    ["invoiceDate","开票日期"],["buyerName","购方名称"],["buyerTaxId","购方税号"],
    ["sellerName","销方名称"],["amount","金额"],["taxAmount","税额"],
    ["totalAmount","价税合计"],["checkCode","校验码"]
  ], data));

  // Layer 2 - 报销业务字段
  card.appendChild(createFieldLayer("💼 报销业务字段", [
    ["expenseType","费用类型"],["expenseDate","费用发生日期"],["city","城市"],
    ["tripCode","出差/项目编号"],["costCenter","成本中心"],["purpose","用途"],
    ["participants","参与人员"],["clientName","客户名称"]
  ], data));

  // Layer 3 - 系统匹配字段
  card.appendChild(createFieldLayer("🔧 系统匹配字段", [
    ["applicant","申请人"],["department","部门"],["level","职级"],
    ["approver","审批人"],["budgetSubject","预算科目"],
    ["hasPreApplication","是否已有事前申请"],["duplicateHit","是否命中历史重复票据"]
  ], data));

  // Buttons
  var btnDiv = document.createElement("div");
  btnDiv.style.cssText = "margin-top:12px;display:flex;gap:8px;";
  var confirmBtn = document.createElement("button");
  confirmBtn.className = "btn btn-primary";
  confirmBtn.textContent = "确认字段";
  confirmBtn.onclick = function(){ confirmFields(); };
  btnDiv.appendChild(confirmBtn);
  var reOcrBtn = document.createElement("button");
  reOcrBtn.className = "btn";
  reOcrBtn.textContent = "重新识别";
  reOcrBtn.onclick = function(){ currentFlowStep=1; performOCR(currentExpenseType); };
  btnDiv.appendChild(reOcrBtn);
  card.appendChild(btnDiv);
  return card;
}

function createFieldLayer(title, fields, data) {
  var layer = document.createElement("div");
  layer.className = "field-layer";
  var titleDiv = document.createElement("div");
  titleDiv.className = "field-layer-title";
  titleDiv.textContent = title;
  layer.appendChild(titleDiv);
  fields.forEach(function(f) { layer.appendChild(createFieldRow(f[0], f[1], data)); });
  return layer;
}

function createFieldRow(key, label, data) {
  var row = document.createElement("div");
  row.className = "field-row";
  var val = data[key] != null ? data[key] : "—";
  var conf = data.confidences ? (data.confidences[key] || 0) : 0.5;
  var confClass = conf>=0.95?"conf-high":conf>=0.80?"conf-mid":"conf-low";
  var statusText, statusClass;
  if (conf>=0.95) { statusText="自动通过"; statusClass="status-pass"; }
  else if (conf>=0.80) { statusText="提醒确认"; statusClass="status-remind"; }
  else { statusText="须确认"; statusClass="status-confirm"; }
  var valStr = String(val).replace(/"/g, "&quot;");
  row.innerHTML =
    '<span class="field-label">'+label+'</span>' +
    '<span class="field-value"><input type="text" data-field="'+key+'" value="'+valStr+'" onchange="onFieldEdit(this,\''+key+'\')"></span>' +
    '<span class="field-confidence '+confClass+'">'+(conf*100).toFixed(0)+'%</span>' +
    '<span class="field-status '+statusClass+'" data-field-status="'+key+'">'+statusText+'</span>';
  return row;
}

function onFieldEdit(input, key) {
  if (currentOcrData) currentOcrData[key] = input.value;
  var statusEl = input.closest(".field-row").querySelector('[data-field-status="'+key+'"]');
  if (statusEl) { statusEl.textContent = "已人工修改"; statusEl.className = "field-status status-edited"; }
  var confEl = input.closest(".field-row").querySelector(".field-confidence");
  if (confEl) { confEl.textContent = "100%"; confEl.className = "field-confidence conf-high"; }
  var precheckBtn = document.getElementById("btnRunPrecheck");
  if (precheckBtn) precheckBtn.disabled = false;
  showToast("字段已修改", "info");
}

/* ============================================================
   FLOW STEP 3: 字段确认
   ============================================================ */
function confirmFields() {
  currentFlowStep = 3;
  document.querySelectorAll('.ocr-card input[data-field]').forEach(function(input){
    if (currentOcrData) currentOcrData[input.dataset.field] = input.value;
  });
  addBotMessage("字段已确认！正在检查附件完整性…");

}

/* ============================================================
   FLOW STEP 4: 附件完整性检查
   ============================================================ */
function checkAttachments() {
  currentFlowStep = 4;
  var checklist = ATTACHMENT_CHECKLISTS[currentExpenseType] || [];
  var card = document.createElement("div");
  card.className = "attachment-card";
  card.innerHTML = "<h4>📎 附件完整性检查</h4>";
  checklist.forEach(function(item){
    var statusClass = (item.status==="已上传"||item.status==="已确认")?"status-pass":item.status==="缺失"?"status-confirm":"status-remind";
    var div = document.createElement("div");
    div.className = "attach-item";
    div.innerHTML =
      '<span class="attach-name">'+item.name+'</span>' +
      '<span class="attach-status '+statusClass+'">'+item.status+'</span>' +
      '<span class="attach-required">'+(item.required?'必填':'选填')+'</span>' +
      '<span class="attach-reason">'+(item.reason||'—')+'</span>' +
      '<span class="attach-action" onclick="handleAttachAction(\''+item.name+'\',\''+item.action+'\')">'+(item.action||'—')+'</span>';
    card.appendChild(div);
  });
  var missing = checklist.filter(function(c){ return c.required && c.status==="缺失"; });
  var summaryHtml = missing.length > 0 ?
    '<div style="margin-top:10px;padding:8px 12px;background:#fef3c7;border-radius:6px;font-size:13px;color:#b45309;">⚠ 缺失 '+missing.length+' 项必填材料: '+missing.map(function(m){return m.name;}).join("、")+'</div>' :
    '<div style="margin-top:10px;padding:8px 12px;background:#dcfce7;border-radius:6px;font-size:13px;color:#15803d;">✓ 必填材料齐全</div>';
  card.innerHTML += summaryHtml;
  var btnDiv = document.createElement("div");
  btnDiv.style.cssText = "margin-top:12px;";
  var precheckBtn = document.createElement("button");
  precheckBtn.className = "btn btn-primary";
  precheckBtn.id = "btnRunPrecheck";
  precheckBtn.textContent = "运行预审";
  precheckBtn.onclick = function(){ runPrecheck(); };
  btnDiv.appendChild(precheckBtn);
  card.appendChild(btnDiv);

  var bubble = addBotMessage("", card);
  bubble.insertBefore(createStepIndicator(4), bubble.firstChild);
}

function handleAttachAction(name, action) {
  if (action==="点击上传") showToast("已触发上传: " + name, "info");
  else if (action==="生成说明") showToast("将在预审后生成说明", "info");
  else if (action==="点击填写") showToast("请填写: " + name, "info");
}

/* ============================================================
   FLOW STEP 5: 规则引擎预审
   ============================================================ */
async function runPrecheck() {
  currentFlowStep = 5;
  addBotMessage("正在运行规则引擎预审…");

  if (isApiConfigured("precheck")) {
    try {
      var result = await callConfiguredApi("precheck", {data:currentOcrData});
      if (result.ok && result.data) { currentPrecheckResult = result.data; showPrecheckResult(currentPrecheckResult); return; }
    } catch(e) {}
  }

  // Deterministic rule engine (NO LLM for rule checks)
  var hitRules = [];
  var allRuleResults = PRECHECK_RULES.map(function(rule){ return rule.check(currentOcrData); });
  allRuleResults.forEach(function(r){ if(r && r.status !== "pass") hitRules.push(r); });

  // Risk score calculation (deterministic, NO LLM)
  var riskScore = 0;
  hitRules.forEach(function(r){
    if (r.status==="block") riskScore += 30;
    else if (r.status==="warning") riskScore += 15;
    else if (r.status==="info") riskScore += 5;
  });
  riskScore = Math.min(riskScore, 100);

  // Conclusion (deterministic, NO LLM)
  var precheckResult, riskLevel;
  var hasBlock = hitRules.some(function(r){return r.status==="block";});
  var hasWarning = hitRules.some(function(r){return r.status==="warning";});
  if (hasBlock) { precheckResult = "拦截"; riskLevel = "high"; }
  else if (hasWarning) { precheckResult = "预警"; riskLevel = "medium"; }
  else { precheckResult = "通过"; riskLevel = "low"; }

  currentPrecheckResult = {
    result: precheckResult,
    risk_level: riskLevel,
    risk_score: riskScore,
    hit_rules: hitRules,
    all_rules: allRuleResults,
    next_actions: getNextActions(precheckResult)
  };
  showPrecheckResult(currentPrecheckResult);
}

function getNextActions(result) {
  if (result==="通过") return ["一键提交正式报销","暂存草稿"];
  if (result==="预警") return ["补充说明","上传附件","生成超标说明","仍然提交并标记风险"];
  if (result==="拦截") return ["修改费用类别","替换发票","发起特殊审批","暂存草稿"];
  return ["补充字段","补充附件","重新识别","重新预审"];
}

function showPrecheckResult(result) {
  var card = document.createElement("div");
  card.className = "precheck-card";
  var resultClass = result.result==="通过"?"result-pass":result.result==="预警"?"result-warn":result.result==="拦截"?"result-block":"result-info";
  var riskColor = result.risk_level==="low"?"var(--green)":result.risk_level==="medium"?"var(--yellow)":"var(--red)";
  var riskLabel = {low:"低",medium:"中",high:"高"};

  var html = '<h4>🔍 预审结果</h4>';
  html += '<div class="precheck-summary">';
  html += '<div class="summary-item"><div class="summary-label">结论</div><div class="summary-value '+resultClass+'">'+result.result+'</div></div>';
  html += '<div class="summary-item"><div class="summary-label">风险等级</div><div class="summary-value" style="color:'+riskColor+'">'+(riskLabel[result.risk_level]||result.risk_level)+'</div></div>';
  html += '<div class="summary-item"><div class="summary-label">风险分</div><div class="summary-value" style="color:'+riskColor+'">'+result.risk_score+'</div></div>';
  html += '</div>';

  html += '<div style="overflow-x:auto;"><table class="rule-table"><thead><tr>';
  html += '<th>规则ID</th><th>规则名</th><th>状态</th><th>实际值</th><th>标准值</th><th>差异</th><th>依据</th><th>建议动作</th>';
  html += '</tr></thead><tbody>';
  var allRules = result.all_rules || result.hit_rules || [];
  allRules.forEach(function(r){
    var stClass = r.status==="pass"?"status-pass":r.status==="warning"?"status-remind":r.status==="block"?"status-confirm":"status-edited";
    var stText = r.status==="pass"?"通过":r.status==="warning"?"预警":r.status==="block"?"拦截":"信息";
    html += '<tr><td>'+r.rule_id+'</td><td>'+r.rule_name+'</td>';
    html += '<td><span class="rule-status '+stClass+'">'+stText+'</span></td>';
    html += '<td>'+r.fact+'</td><td>'+r.standard+'</td><td>'+r.gap+'</td>';
    html += '<td>'+r.basis+'</td><td>'+r.required_action+'</td></tr>';
  });
  html += '</tbody></table></div>';
  card.innerHTML = html;

  // AI explain button
  var explainDiv = document.createElement("div");
  explainDiv.style.cssText = "margin-top:12px;";
  var explainBtn = document.createElement("button");
  explainBtn.className = "btn";
  explainBtn.textContent = "AI 解释预审结果";
  explainBtn.onclick = function(){
    explainBtn.disabled = true;
    explainBtn.textContent = "生成中…";
    llmExplainPrecheck(result).then(function(text){
      var explainCard = document.createElement("div");
      explainCard.className = "note-card";
      explainCard.innerHTML = "<h4>💡 AI 预审解释</h4><div style='font-size:13px;line-height:1.7;white-space:pre-wrap;'>"+escapeHtml(text)+"</div><div class='note-mark'>AI 生成内容，请人工确认</div>";
      addBotMessage("", explainCard);
      explainBtn.textContent = "AI 解释预审结果";
      explainBtn.disabled = false;
    });
  };
  explainDiv.appendChild(explainBtn);
  card.appendChild(explainDiv);

  var bubble = addBotMessage("", card);
  bubble.insertBefore(createStepIndicator(5), bubble.firstChild);
  setTimeout(function(){ showClosureActions(result); }, 300);
}

function escapeHtml(str) { var d=document.createElement("div"); d.textContent=str; return d.innerHTML; }

/* ============================================================
   FLOW STEP 6: 用户纠错与闭环提交
   ============================================================ */
function showClosureActions(result) {
  currentFlowStep = 6;
  var card = document.createElement("div");
  card.className = "closure-card";
  card.innerHTML = "<h4>🎯 下一步操作</h4>";
  var actionsDiv = document.createElement("div");
  actionsDiv.className = "closure-actions";
  var actions = result.next_actions || [];
  actions.forEach(function(action){
    var btn = document.createElement("button");
    btn.textContent = action;
    if (action==="一键提交正式报销") { btn.className="primary"; btn.onclick=function(){submitFormalReimb();}; }
    else if (action==="暂存草稿") { btn.onclick=function(){saveDraft();}; }
    else if (action==="补充说明"||action==="生成超标说明") { btn.className="primary"; btn.onclick=function(){generateNote();}; }
    else if (action==="上传附件") { btn.onclick=function(){triggerUpload();}; }
    else if (action==="仍然提交并标记风险") { btn.className="primary"; btn.onclick=function(){submitWithRisk();}; }
    else if (action==="修改费用类别") { btn.onclick=function(){modifyExpenseType();}; }
    else if (action==="替换发票") { btn.onclick=function(){triggerUpload();showToast("请上传新发票替换","info");}; }
    else if (action==="发起特殊审批") { btn.className="primary"; btn.onclick=function(){initiateSpecialApproval();}; }
    else if (action==="补充字段") { btn.onclick=function(){reEditFields();}; }
    else if (action==="补充附件") { btn.onclick=function(){triggerUpload();}; }
    else if (action==="重新识别") { btn.onclick=function(){currentFlowStep=1;performOCR(currentExpenseType);}; }
    else if (action==="重新预审") { btn.onclick=function(){runPrecheck();}; }
    else { btn.onclick=function(){showToast(action+" 功能已触发","info");}; }
    actionsDiv.appendChild(btn);
  });
  card.appendChild(actionsDiv);
  var bubble = addBotMessage("", card);
  bubble.insertBefore(createStepIndicator(6), bubble.firstChild);
}

function resetFlow() { currentFlowStep=0; currentOcrData=null; currentPrecheckResult=null; currentExpenseType=""; }

/* ============================================================
   SEND MESSAGE (chat)
   ============================================================ */
async function sendMessage() {
  var input = document.getElementById("chatInput");
  var text = input.value.trim();
  if (!text) return;
  input.value = "";
  addUserMessage(text);

  if (currentFlowStep === 0) {
    if (text==="取消"||text==="重置") { resetFlow(); addBotMessage("流程已重置，您可以重新开始。"); return; }
    // Detect expense type for flow start
    var type = null;
    if (text.indexOf("上传")>=0||text.indexOf("发票")>=0||text.indexOf("预审")>=0) type = "差旅交通费";
    if (text.indexOf("住宿")>=0) type = "住宿费";
    if (text.indexOf("招待")>=0||text.indexOf("客户")>=0) type = "客户招待费";
    if (text.indexOf("采购")>=0||text.indexOf("办公")>=0) type = "办公采购";
    if (text.indexOf("差旅")>=0) type = "差旅交通费";
    if (type) { startFlow(type); return; }
    // QA mode
    var qaResult = await processQuestion(text);
    var html = qaResult.answer;
    html += '<div class="qa-path">问答路径: '+qaResult.path+' | 是否调用LLM: '+(qaResult.usedLLM?"是":"否")+' | 引用来源: '+qaResult.source+'</div>';
    addBotMessage(html);
  } else {
    if (text==="取消"||text==="重置") { resetFlow(); addBotMessage("流程已重置，您可以重新开始。"); return; }
    addBotMessage("当前正在处理报销流程中，请先完成当前步骤或点击相应按钮。如需中断，请输入【取消】。");
  }
}

/* ============================================================
   REIMBURSEMENTS TABLE
   ============================================================ */
function filterReimbTable() {
  var typeFilter = document.getElementById("filterType").value;
  var statusFilter = document.getElementById("filterStatus").value;
  var dateStart = document.getElementById("filterDateStart").value;
  var dateEnd = document.getElementById("filterDateEnd").value;
  filteredReimbData = allReimbursements.filter(function(r){
    if (typeFilter && r.type !== typeFilter) return false;
    if (statusFilter && r.status !== statusFilter) return false;
    if (dateStart && r.date < dateStart) return false;
    if (dateEnd && r.date > dateEnd) return false;
    return true;
  });
  sortReimbData();
  renderReimbTable();
}

function sortReimbTable(key) {
  if (reimbSortKey === key) reimbSortAsc = !reimbSortAsc;
  else { reimbSortKey = key; reimbSortAsc = true; }
  sortReimbData();
  renderReimbTable();
}

function sortReimbData() {
  filteredReimbData.sort(function(a,b){
    var va=a[reimbSortKey], vb=b[reimbSortKey];
    if (typeof va === "number") return reimbSortAsc ? va-vb : vb-va;
    return reimbSortAsc ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
  });
}

function renderReimbTable() {
  var body = document.getElementById("reimbBody");
  body.innerHTML = "";
  filteredReimbData.forEach(function(r){
    var statusColor = r.status==="通过"?"var(--green)":r.status==="预警"?"var(--yellow)":r.status==="拦截"?"var(--red)":r.status==="信息不足"?"var(--blue)":"var(--text-secondary)";
    var tr = document.createElement("tr");
    tr.innerHTML =
      '<td>'+r.id+'</td><td>'+r.type+'</td><td>¥'+r.amount+'</td><td>'+r.date+'</td>' +
      '<td style="color:'+statusColor+';font-weight:600;">'+r.status+'</td>' +
      '<td>'+r.riskScore+'</td>' +
      '<td><button class="btn" style="padding:4px 10px;font-size:12px;" onclick="viewReimbDetail(\''+r.id+'\')">详情</button></td>';
    body.appendChild(tr);
  });
}

function viewReimbDetail(id) {
  var r = allReimbursements.find(function(x){return x.id===id;});
  if (!r) return;
  switchPage("chat");
  addBotMessage("<b>"+r.id+"</b><br>类型: "+r.type+"<br>金额: ¥"+r.amount+"<br>日期: "+r.date+"<br>状态: "+r.status+"<br>申请人: "+r.applicant+"<br>部门: "+r.department);
  showToast("已跳转至智能对话查看详情", "info");
}

function exportFilteredCSV() {
  if (filteredReimbData.length===0) { showToast("没有可导出的数据","warning"); return; }
  var header = "单号,费用类型,金额,申请日期,状态,风险分,申请人,部门\n";
  var rows = filteredReimbData.map(function(r){
    return [r.id,r.type,r.amount,r.date,r.status,r.riskScore,r.applicant,r.department].join(",");
  }).join("\n");
  var csv = "\uFEFF" + header + rows;
  var blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url; a.download = "报销记录_" + new Date().toISOString().slice(0,10) + ".csv";
  a.click(); URL.revokeObjectURL(url);
  showToast("已导出 " + filteredReimbData.length + " 条记录", "success");
}
