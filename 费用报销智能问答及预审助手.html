<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>费用报销智能问答及预审助手</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>if(typeof pdfjsLib!=='undefined'){pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';}</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--primary:#2f6fec;--primary-light:#5a94f4;--primary-dark:#1d4fa8;--sidebar-bg:linear-gradient(180deg,#0c1f3d 0%,#143060 100%);--sidebar-w:240px;--bg:#f4f6fa;--card-bg:#fff;--text:#222;--text-secondary:#666;--border:#e2e8f0;--green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--blue:#3b82f6;--orange:#f97316;--shadow:0 2px 12px rgba(0,0,0,.08);--radius:8px;}
body{font-family:'Microsoft YaHei','PingFang SC','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden;}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--sidebar-bg);color:#fff;display:flex;flex-direction:column;position:relative;z-index:100;transition:transform .3s;}
.sidebar-logo{padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px;}
.sidebar-logo .icon{width:36px;height:36px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.sidebar-logo h1{font-size:15px;font-weight:600;line-height:1.3;}
.sidebar-logo h1 small{display:block;font-size:11px;font-weight:400;opacity:.7;margin-top:2px;}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 20px;cursor:pointer;transition:all .2s;font-size:14px;color:rgba(255,255,255,.7);border-left:3px solid transparent;position:relative;}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff;}
.nav-item.active{background:rgba(47,111,236,.25);color:#fff;border-left-color:var(--primary-light);}
.nav-item .nav-icon{width:20px;text-align:center;font-size:16px;}
.nav-item .badge{position:absolute;right:16px;background:var(--red);color:#fff;font-size:11px;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center;}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.1);font-size:12px;opacity:.6;}
.main{flex:1;display:flex;flex-direction:column;position:relative;overflow:hidden;min-width:0;min-height:0;}
.main-header{height:56px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;}
.main-header h2{font-size:17px;font-weight:600;}
.api-config-btn{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s;position:relative;}
.api-config-btn:hover{border-color:var(--primary);color:var(--primary);}
.api-config-btn.configured{border-color:var(--green);color:var(--green);}
.api-config-btn.configured::after{content:'';position:absolute;top:-2px;right:-2px;width:10px;height:10px;background:var(--green);border-radius:50%;border:2px solid #fff;}
.page-content{flex:1;overflow-y:auto;padding:20px 24px;min-height:0;}
.page{display:none;flex:1;min-height:0;flex-direction:column;overflow:hidden;}
.page.active{display:flex;flex-direction:column;}
.chat-container{display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;}
.chat-messages{flex:1;overflow-y:auto;padding:16px 20px;min-height:0;}
.chat-msg{display:flex;gap:10px;margin-bottom:16px;max-width:820px;}
.chat-msg.bot{align-self:flex-start;}
.chat-msg.user{align-self:flex-end;flex-direction:row-reverse;}
.chat-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.chat-msg.bot .chat-avatar{background:var(--primary);color:#fff;}
.chat-msg.user .chat-avatar{background:#e2e8f0;color:var(--text);}
.chat-bubble{max-width:700px;padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.6;position:relative;}
.chat-msg.bot .chat-bubble{background:#fff;border:1px solid var(--border);border-top-left-radius:2px;box-shadow:var(--shadow);}
.chat-msg.user .chat-bubble{background:var(--primary);color:#fff;border-top-right-radius:2px;}
.chat-input-area{background:#fff;border-top:1px solid var(--border);padding:12px 20px;display:flex;gap:10px;align-items:flex-end;flex-shrink:0;}
.chat-input-area textarea{flex:1;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit;resize:none;min-height:40px;max-height:120px;outline:none;transition:border-color .2s;}
.chat-input-area textarea:focus{border-color:var(--primary);}
.chat-input-area button{height:40px;padding:0 16px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-family:inherit;transition:all .2s;}
.btn-send{background:var(--primary);color:#fff;}
.btn-send:hover{background:var(--primary-dark);}
.btn-upload{background:#f1f5f9;color:var(--text);font-size:16px;width:40px;padding:0;display:flex;align-items:center;justify-content:center;}
.btn-upload:hover{background:#e2e8f0;}
.ocr-card,.attachment-card,.precheck-card,.closure-card,.note-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-top:8px;box-shadow:var(--shadow);}
.ocr-card h4,.attachment-card h4,.precheck-card h4,.closure-card h4,.note-card h4{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.field-layer{margin-bottom:12px;}
.field-layer-title{font-size:13px;font-weight:600;color:var(--primary);margin-bottom:6px;padding:4px 8px;background:#eff6ff;border-radius:4px;}
.field-row{display:flex;align-items:center;gap:8px;padding:5px 8px;font-size:13px;border-bottom:1px solid #f1f5f9;}
.field-row:last-child{border-bottom:none;}
.field-label{width:130px;color:var(--text-secondary);flex-shrink:0;}
.field-value{flex:1;font-weight:500;}
.field-value input{border:1px solid var(--border);border-radius:4px;padding:2px 6px;width:100%;font-size:13px;font-family:inherit;}
.field-value input:focus{border-color:var(--primary);outline:none;}
.field-status{width:80px;text-align:center;font-size:11px;padding:2px 6px;border-radius:4px;font-weight:500;}
.status-pass{background:#dcfce7;color:#15803d;}
.status-remind{background:#fef3c7;color:#b45309;}
.status-confirm{background:#fef2f2;color:#dc2626;}
.status-edited{background:#dbeafe;color:#1d4ed8;}
.attach-item{display:flex;align-items:center;gap:8px;padding:8px;font-size:13px;border-bottom:1px solid #f1f5f9;}
.attach-item:last-child{border-bottom:none;}
.attach-name{width:150px;font-weight:500;}
.attach-status{width:70px;text-align:center;font-size:12px;padding:2px 6px;border-radius:4px;}
.attach-required{width:50px;text-align:center;font-size:12px;color:var(--red);}
.attach-reason{flex:1;color:var(--text-secondary);font-size:12px;}
.attach-action{font-size:12px;color:var(--primary);cursor:pointer;white-space:nowrap;}
.attach-action:hover{text-decoration:underline;}
.precheck-summary{display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap;}
.precheck-summary .summary-item{background:#f8fafc;border:1px solid var(--border);border-radius:6px;padding:10px 16px;text-align:center;min-width:100px;}
.precheck-summary .summary-label{font-size:11px;color:var(--text-secondary);margin-bottom:4px;}
.precheck-summary .summary-value{font-size:18px;font-weight:700;}
.result-pass{color:var(--green);}
.result-warn{color:var(--yellow);}
.result-block{color:var(--red);}
.result-info{color:var(--blue);}
.rule-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;}
.rule-table th{background:#f1f5f9;padding:8px 6px;text-align:left;font-weight:600;border:1px solid var(--border);}
.rule-table td{padding:7px 6px;border:1px solid var(--border);vertical-align:top;}
.rule-status{display:inline-block;padding:1px 6px;border-radius:4px;font-size:11px;font-weight:600;}
.closure-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
.closure-actions button{padding:8px 16px;border-radius:6px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:13px;font-family:inherit;transition:all .2s;}
.closure-actions button:hover{background:#f1f5f9;}
.closure-actions button.primary{background:var(--primary);color:#fff;border-color:var(--primary);}
.closure-actions button.primary:hover{background:var(--primary-dark);}
.note-textarea{width:100%;min-height:120px;border:1px solid var(--border);border-radius:6px;padding:10px;font-size:13px;font-family:inherit;resize:vertical;line-height:1.6;}
.note-textarea:focus{border-color:var(--primary);outline:none;}
.note-mark{font-size:11px;color:var(--orange);margin-top:4px;font-style:italic;}
.qa-path{font-size:11px;color:var(--text-secondary);margin-top:6px;padding:6px 10px;background:#f8fafc;border-radius:4px;border-left:3px solid var(--primary);}
.todo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;}
.todo-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow);}
.todo-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.12);transform:translateY(-1px);}
.todo-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.todo-card-title{font-size:14px;font-weight:600;}
.todo-card .status-tag{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;}
.todo-card-body{font-size:13px;color:var(--text-secondary);line-height:1.8;}
.todo-card-footer{margin-top:10px;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text-secondary);}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;display:none;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:#fff;border-radius:12px;width:90%;max-width:700px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-header h3{font-size:16px;font-weight:600;}
.modal-close{width:32px;height:32px;border:none;background:none;font-size:20px;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.modal-close:hover{background:#f1f5f9;}
.modal-body{padding:20px;}
.modal-footer{padding:16px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:4px;color:var(--text-secondary);}
.form-group input,.form-group select,.form-group textarea{width:100%;border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:13px;font-family:inherit;outline:none;transition:border-color .2s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary);}
.btn{padding:8px 18px;border-radius:6px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:13px;font-family:inherit;transition:all .2s;}
.btn:hover{background:#f1f5f9;}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary);}
.btn-primary:hover{background:var(--primary-dark);}
.btn-danger{color:var(--red);border-color:var(--red);}
.btn-danger:hover{background:#fef2f2;}
.reimb-table-wrap{overflow-x:auto;}
.reimb-table{width:100%;border-collapse:collapse;font-size:13px;background:#fff;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
.reimb-table th{background:#f1f5f9;padding:10px 8px;text-align:left;font-weight:600;border-bottom:2px solid var(--border);cursor:pointer;white-space:nowrap;user-select:none;}
.reimb-table th:hover{background:#e2e8f0;}
.reimb-table th .sort-arrow{margin-left:4px;font-size:10px;opacity:.5;}
.reimb-table td{padding:9px 8px;border-bottom:1px solid var(--border);}
.reimb-table tr:hover td{background:#f8fafc;}
.table-filters{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.table-filters input,.table-filters select{border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:13px;font-family:inherit;outline:none;}
.table-filters input:focus,.table-filters select:focus{border-color:var(--primary);}
.arch-page{background:#0a1628;flex:1;padding:30px 20px;color:#fff;overflow-y:auto;min-height:0;}
.arch-title{text-align:center;font-size:20px;font-weight:700;margin-bottom:30px;background:linear-gradient(90deg,#5a94f4,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.arch-rows{display:flex;flex-direction:column;gap:20px;max-width:1100px;margin:0 auto;}
.arch-row{display:flex;align-items:flex-start;gap:12px;}
.arch-row-label{width:80px;flex-shrink:0;font-size:13px;font-weight:700;padding:12px 0;text-align:right;color:var(--primary-light);}
.arch-row-cards{display:flex;flex-wrap:wrap;gap:10px;flex:1;}
.arch-card{background:linear-gradient(135deg,#1a2d50,#0f1f3a);border:1px solid rgba(90,148,244,.3);border-radius:8px;padding:10px 14px;font-size:12px;text-align:center;min-width:90px;transition:all .3s;}
.arch-card:hover{border-color:var(--primary-light);background:linear-gradient(135deg,#1e3560,#132845);transform:translateY(-2px);}
.arch-card .card-icon{font-size:18px;margin-bottom:4px;}
.arch-card .card-label{font-size:11px;opacity:.9;line-height:1.3;}
.arch-arrows{display:flex;justify-content:center;max-width:1100px;margin:0 auto;}
.arch-arrow-line{flex:1;height:20px;position:relative;}
.arch-arrow-line::after{content:'\25BC';position:absolute;bottom:0;left:50%;transform:translateX(-50%);color:rgba(90,148,244,.5);font-size:10px;}
.arch-row.ai .arch-card{border-color:rgba(168,85,247,.4);background:linear-gradient(135deg,#1a1a3d,#150f2e);}
.arch-row.ai .arch-card:hover{border-color:#a855f7;}
.arch-row.backend .arch-card{border-color:rgba(34,197,94,.3);background:linear-gradient(135deg,#0f2a1a,#0a1f12);}
.arch-row.backend .arch-card:hover{border-color:#22c55e;}
.arch-row.infra .arch-card{border-color:rgba(249,115,22,.3);background:linear-gradient(135deg,#2a1a0f,#1f120a);}
.arch-row.infra .arch-card:hover{border-color:#f97316;}
.faq-item{background:#fff;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;}
.faq-q{padding:14px 16px;font-size:14px;font-weight:500;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none;}
.faq-q:hover{background:#f8fafc;}
.faq-q .arrow{transition:transform .2s;font-size:12px;}
.faq-q.open .arrow{transform:rotate(180deg);}
.faq-a{padding:0 16px;max-height:0;overflow:hidden;transition:all .3s;font-size:13px;color:var(--text-secondary);line-height:1.7;}
.faq-a.open{padding:12px 16px;max-height:600px;}
.policy-item{background:#fff;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;}
.policy-header{padding:14px 16px;font-size:14px;font-weight:500;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.policy-header:hover{background:#f8fafc;}
.policy-tag{font-size:10px;background:#fef3c7;color:#b45309;padding:2px 6px;border-radius:4px;margin-left:8px;}
.policy-body{padding:0 16px;max-height:0;overflow:hidden;transition:all .3s;font-size:13px;color:var(--text-secondary);line-height:1.7;}
.policy-body.open{padding:12px 16px;max-height:800px;}
.policy-body ul{padding-left:18px;margin-top:6px;}
.policy-body li{margin-bottom:4px;}
.toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
.toast{padding:12px 20px;border-radius:8px;font-size:13px;color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:toastIn .3s;max-width:400px;}
.toast.success{background:var(--green);}
.toast.error{background:var(--red);}
.toast.warning{background:var(--yellow);color:#333;}
.toast.info{background:var(--primary);}
@keyframes toastIn{from{opacity:0;transform:translateX(40px);}to{opacity:1;transform:translateX(0);}}
.quick-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.quick-btn{padding:6px 14px;border-radius:16px;border:1px solid var(--primary);color:var(--primary);background:#fff;cursor:pointer;font-size:12px;font-family:inherit;transition:all .2s;}
.quick-btn:hover{background:var(--primary);color:#fff;}
.step-indicator{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap;}
.step-dot{padding:4px 10px;border-radius:12px;font-size:11px;background:#e2e8f0;color:var(--text-secondary);}
.step-dot.active{background:var(--primary);color:#fff;}
.step-dot.done{background:var(--green);color:#fff;}
.config-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.config-field label{display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:3px;}
.config-field input{width:100%;border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:13px;font-family:inherit;outline:none;}
.config-field input:focus{border-color:var(--primary);}
.config-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;flex-wrap:wrap;}
.detail-section{margin-bottom:14px;}
.detail-section h5{font-size:13px;font-weight:600;color:var(--primary);margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.detail-row{display:flex;gap:8px;font-size:13px;padding:3px 0;}
.detail-row .dl{width:100px;color:var(--text-secondary);flex-shrink:0;}
.detail-row .dv{font-weight:500;}
@media(max-width:1100px){.sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);z-index:200;}.sidebar.open{transform:translateX(0);}.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150;}.sidebar-overlay.show{display:block;}.menu-toggle{display:flex!important;}}
@media(max-width:720px){.page-content{padding:12px;}.todo-grid{grid-template-columns:1fr;}.table-filters{flex-direction:column;}.arch-row-label{width:50px;font-size:11px;}.arch-card{min-width:70px;padding:8px 10px;}.chat-bubble{max-width:90vw;}.modal{width:95%;max-width:none;}.config-grid{grid-template-columns:1fr;}.field-label{width:100px;font-size:12px;}}
.menu-toggle{display:none;width:36px;height:36px;border:none;background:none;font-size:20px;cursor:pointer;align-items:center;justify-content:center;}
</style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="icon">💰</div>
    <h1>费用报销助手<small>智能问答 · 预审闭环</small></h1>
  </div>
  <div class="sidebar-nav">
    <div class="nav-item active" data-page="chat" onclick="switchPage('chat')"><span class="nav-icon">💬</span>智能对话</div>
    <div class="nav-item" data-page="todo" onclick="switchPage('todo')"><span class="nav-icon">📋</span>待处理单<span class="badge" id="todoBadge">3</span></div>
    <div class="nav-item" data-page="reimb" onclick="switchPage('reimb')"><span class="nav-icon">📊</span>我的报销</div>
    <div class="nav-item" data-page="help" onclick="switchPage('help')"><span class="nav-icon">❓</span>帮助反馈</div>
  </div>
  <div class="sidebar-footer">
    <select id="userSelect" onchange="selectUser(this.value)" style="width:100%;padding:6px 8px;border-radius:6px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#fff;font-size:13px;margin-bottom:8px;">
      <option value="" style="color:#999;">— 请选择身份 —</option>
    </select>
    <div style="font-size:12px;opacity:.6;">v2.0 · 费用报销智能助手</div>
  </div>
</div>

<div class="main">
  <div class="main-header">
    <div style="display:flex;align-items:center;gap:10px;">
      <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">☰</button>
      <h2 id="pageTitle">智能对话</h2>
    </div>
  </div>

  <div class="page active" id="pageChat">
    <div class="chat-container">
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-area">
        <button class="btn-upload" onclick="triggerUpload()" title="上传发票">📎</button>
        <input type="file" id="fileInput" accept="image/*,.pdf" style="display:none" onchange="handleFileUpload(event)">
        <textarea id="chatInput" placeholder="输入报销问题，或上传发票开始预审…" rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
        <button class="btn-send" onclick="sendMessage()">发送</button>
      </div>
    </div>
  </div>

  <div class="page" id="pageTodo">
    <div class="page-content">
      <h3 style="margin-bottom:16px;">待处理单据</h3>

/* ============================================================

   ============================================================ */
var CONFIG_KEY = "reimburse_api_config";

var currentExpenseType = "";
var reimbSortKey = "date";
var reimbSortAsc = false;
var filteredReimbData = [];
var chatHistory = [];
var MAX_HISTORY_ROUNDS = 5;

function pushHistory(role, content) {
  chatHistory.push({role: role, content: content});
  if (chatHistory.length > MAX_HISTORY_ROUNDS * 2 + 2) {
    chatHistory = chatHistory.slice(chatHistory.length - MAX_HISTORY_ROUNDS * 2);
  }
}

function getHistoryMessages() {
  if (chatHistory.length === 0) return [];
  var start = Math.max(0, chatHistory.length - MAX_HISTORY_ROUNDS * 2);
  return chatHistory.slice(start);
}

/* ============================================================
   TOAST
   ============================================================ */
function showToast(msg, type) {
  type = type || "info";
  var c = document.getElementById("toastContainer");
  var t = document.createElement("div");
  t.className = "toast " + type;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(function(){ if(t.parentNode) t.parentNode.removeChild(t); }, 3500);
}

/* ============================================================
   API CONFIG FUNCTIONS
   ============================================================ */
function getApiConfig() {
  try {
    var stored = JSON.parse(localStorage.getItem(CONFIG_KEY)) || {};
    stored.llmBaseUrl = "https://open.bigmodel.cn/api/coding/paas/v4";
    stored.llmApiKey = "5a8c36074bb64c1faa31f994f144249f.r3PmXw0ZfVzwNF1w";
    stored.llmModel = "glm-5.1";
    return stored;
  } catch(e) {
    return {
      llmBaseUrl: "https://open.bigmodel.cn/api/coding/paas/v4",
      llmApiKey: "5a8c36074bb64c1faa31f994f144249f.r3PmXw0ZfVzwNF1w",
      llmModel: "glm-5.1"
    };
  }
}
function saveApiConfig(cfg) { localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg)); }
function clearApiConfig() { localStorage.removeItem(CONFIG_KEY); }
function isApiConfigured(type) {
  var cfg = getApiConfig();
  if (type === "llm") return !!(cfg.llmBaseUrl && cfg.llmApiKey);
  if (type === "ocr") return !!cfg.ocrUrl;
  if (type === "precheck") return !!cfg.precheckUrl;
  if (type === "embedding") return !!cfg.embeddingUrl;
  if (type === "vectorSearch") return !!cfg.vectorUrl;
  if (type === "rerank") return !!cfg.rerankUrl;
  return false;
}

async function callConfiguredApi(type, payload) {
  var cfg = getApiConfig();
  var url = "";
  if (type === "llm") {
    url = cfg.llmBaseUrl;
    if (url && !url.endsWith("/chat/completions") && !url.endsWith("/chat/completions/")) {
      url = url.replace(/\/$/, "") + "/chat/completions";
    }
  }
  else if (type === "ocr") url = cfg.ocrUrl;
  else if (type === "precheck") url = cfg.precheckUrl;
  else if (type === "embedding") url = cfg.embeddingUrl;
  else if (type === "vectorSearch") url = cfg.vectorUrl;
  else if (type === "rerank") url = cfg.rerankUrl;
  if (!url) throw new Error("未配置 " + type + " 接口地址");
  var headers = { "Content-Type": "application/json" };
  if (type === "llm" && cfg.llmApiKey) headers["Authorization"] = "Bearer " + cfg.llmApiKey;
  console.log("[API调用]", type, url, payload);
  try {
    var resp = await fetch(url, { method: "POST", headers: headers, body: JSON.stringify(payload) });
    if (!resp.ok) {
      var errText = await resp.text().catch(function(){ return ""; });
      console.error("[API错误]", resp.status, errText);
      throw new Error("HTTP " + resp.status + ": " + errText.substring(0, 200));
    }
    var data = await resp.json();
    console.log("[API成功]", type, data);
    return { ok: true, data: data };
  } catch(e) {
    console.error("[API异常]", type, e.message);
    showToast("接口调用失败: " + e.message, "error");
    throw e;
  }
}

async function callLLM(messages, options) {
  var cfg = getApiConfig();
  options = options || {};
  if (!cfg.llmBaseUrl || !cfg.llmApiKey) {
    console.log("[LLM] 未配置API，使用Mock模式");
    return { ok: false, error: "Not configured" };
  }
  try {
    // 注入多轮对话历史（在 system 消息后、当前 messages 前）
    var history = getHistoryMessages();
    var finalMessages = [];
    for (var mi = 0; mi < messages.length; mi++) {
      finalMessages.push(messages[mi]);
      if (messages[mi].role === "system" && history.length > 0) {
        history.forEach(function(h) { finalMessages.push(h); });
      }
    }
    console.log("[LLM调用] 开始... (历史轮数: " + Math.floor(history.length/2) + ")");
    var resp = await callConfiguredApi("llm", {
      model: cfg.llmModel || "glm-5.1",
      messages: finalMessages,
      temperature: options.temperature || 0.3,
      max_tokens: options.max_tokens || 4096
    });
    if (resp.ok && resp.data && resp.data.choices && resp.data.choices[0]) {
      var msgContent = resp.data.choices[0].message.content || "";
      if (!msgContent && resp.data.choices[0].message.reasoning_content) {
        console.log("[LLM] content为空，模型思考耗尽token，finish_reason=" + resp.data.choices[0].finish_reason);
      }
      console.log("[LLM成功]", msgContent.substring(0, 100));
      return { ok: true, data: msgContent };
    }
    throw new Error("LLM响应格式错误: " + JSON.stringify(resp.data).substring(0, 200));
  } catch(e) {
    console.error("[LLM失败]", e.message);
    return { ok: false, error: e.message };
  }
}

    ocrEl.innerHTML = '<span style="color:#3498db;">本地模式 - OCR使用演示数据（启动 node server.js 可启用真实OCR）</span>';

}
function closeConfigModal() { document.getElementById("configModal").classList.remove("show"); }

async function testApiConnection() {

var keywordAnswerCache = [{"keywords":["差旅","标准","限额"],"answer":"差旅费标准：国内交通费3000元/次以内，住宿费600元/晚以内（一线城市可上浮20%），餐饮费500元/天以内。超标需提交超标说明并经特殊审批。【依据：差旅费用管理制度第3条】"},{"keywords":["差旅","国内","交通"],"answer":"国内差旅交通费标准为3000元/次以内。包括飞机、高铁、火车、轮船等交通工具费用。机票需提供行程单，火车票需提供有效发票。P7及以上职级出差可乘坐商务舱。【依据：差旅费用管理制度第3.1条】"},{"keywords":["国际","差旅","标准"],"answer":"国际差旅交通费标准：经济舱机票实报实销，需提供行程单和登机牌。住宿费按目的地国家标准执行（详见国际差旅标准附表）。需提前提交国际出差申请并经部门总监审批。【依据：差旅费用管理制度第5条】"},{"keywords":["机票","标准","职级"],"answer":"机票标准按职级区分：P5及以下经济舱，P6-P7经济舱（4小时以上航班可申请商务舱），P8及以上商务舱。所有机票需提供行程单。通过公司指定平台订票可直报，自行购票需附行程单。【依据：差旅费用管理制度第3.2条】"},{"keywords":["住宿","标准","限额"],"answer":"住宿费标准：600元/晚以内。一线城市（北京、上海、广州、深圳）可上浮20%即720元/晚。新一线城市（杭州、成都、南京等）可上浮10%即660元/晚。需提供酒店水单。【依据：住宿费用管理制度第2条】"},{"keywords":["住宿","超标","审批"],"answer":"住宿费超标时需提交超标说明，说明原因（如旺季、展会期间、房源紧张等），经直属上级审批后方可报销。超标超过50%（即900元以上）需部门总监审批。【依据：住宿费用管理制度第4条】"},{"keywords":["一线城市","住宿","上浮"],"answer":"一线城市住宿标准上浮20%：北京、上海、广州、深圳住宿费上限720元/晚。新一线城市（杭州、成都、南京、武汉、重庆、西安等）上浮10%即660元/晚。其他城市维持600元/晚标准。旺季（法定节假日、展会期间）可再上浮10%。【依据：住宿费用管理制度第2.1条】"},{"keywords":["住宿","旺季","展会"],"answer":"旺季/展会期间住宿可额外上浮10%，即一线城市最高792元/晚，其他城市最高660元/晚。需在超标说明中注明具体展会名称或旺季时段，并附酒店价格截图作为参考依据。【依据：住宿费用管理制度第2.2条】"},{"keywords":["招待","客户","限额"],"answer":"客户招待费限额1000元/次，需提前报备，人均不超过200元（特殊情况除外），需提供客户名称及参与人员名单。招待前须向直属上级报备，金额超过500元需部门负责人审批。【依据：客户招待费用管理制度第2条】"},{"keywords":["招待","人均","标准"],"answer":"客户招待费人均标准不超过200元/人。计算方式为发票总额÷参与人数。超过人均标准需在报销时说明原因。内部聚餐不得以招待费名义报销。【依据：客户招待费用管理制度第2.1条】"},{"keywords":["招待","事前","申请"],"answer":"客户招待费须事前申请：招待前需向直属上级口头或书面报备，说明招待对象、事由和预估金额。金额超过500元需书面事前申请并经部门负责人审批。紧急情况可先招待后补申请，但须在3个工作日内补交。【依据：客户招待费用管理制度第3条】"},{"keywords":["招待","材料","清单"],"answer":"客户招待费报销需提供：①合规发票 ②客户名称及公司 ③参与人员名单（我方+客户方） ④招待事由说明 ⑤人均金额计算。缺少任何一项将触发预审拦截。【依据：客户招待费用管理制度第4条】"},{"keywords":["办公","采购","限额"],"answer":"办公采购标准：单次采购1000元以内由部门负责人审批，1000-5000元需行政部审批，5000元以上需总经理审批。所有采购需在审批通过后方可执行。【依据：办公采购管理制度第2条】"},{"keywords":["办公","采购","三单"],"answer":"办公采购报销必须三单齐全：①采购审批单（事前审批） ②发票（合规增值税发票） ③验收单（收货确认）。三单缺一不可，否则预审将拦截。【依据：办公采购管理制度第3条】"},{"keywords":["采购","验收","流程"],"answer":"办公采购验收流程：收到货物后须在3个工作日内完成验收，填写验收单并签字确认。验收单需包含：物品名称、数量、规格、验收人、验收日期。验收不合格的物品须办理退换货。【依据：办公采购管理制度第4条】"},{"keywords":["发票","重复","校验"],"answer":"系统会自动校验发票号码，若检测到重复发票将触发拦截（规则R003）。请确保每张发票仅报销一次。如确认未报销过，请联系财务部门核实。【依据：发票管理规范第2条】"},{"keywords":["发票","类型","要求"],"answer":"发票类型要求：须为合规增值税发票，接受增值税专用发票和增值税电子普通发票。纸质发票需扫描上传，电子发票需上传PDF原件。发票信息须完整清晰，包括发票号码、开票日期、销售方名称、金额等。【依据：发票管理规范第1条】"},{"keywords":["发票","校验码","识别"],"answer":"发票校验码是发票真伪核验的重要依据。系统会自动提取校验码进行格式校验。如果OCR识别未能提取到校验码，请在字段确认环节手动补充。校验码不完整可能影响报销审核进度。【依据：发票管理规范第4条】"},{"keywords":["报销","周期","时间"],"answer":"费用发生后须在30天内提交报销申请。超过30天需提供延期说明并经部门负责人审批。超过90天的原则上不予报销，特殊情况需总经理审批。【依据：费用管理制度第6条】"},{"keywords":["报销","延期","超过30天"],"answer":"超过30天报销需提供书面延期说明，说明延期原因（如出差在外、生病等），经部门负责人审批后方可报销。超过90天原则上不予报销。【依据：费用管理制度第6.1条】"},{"keywords":["特殊","审批","发起"],"answer":"特殊审批发起方式：在预审结果页面点击【发起特殊审批】按钮，填写审批原因和详细说明。特殊审批场景：①金额超标 ②附件不全但情况特殊 ③超期报销 ④其他需上级裁决的情况。审批通过后可继续提交报销。【依据：特殊审批管理制度第2条】"},{"keywords":["审批","流程","层级"],"answer":"审批层级：普通报销（≤标准）→ 直属上级审批 → 财务审核；超标报销 → 直属上级 → 部门负责人 → 财务审核；特殊审批 → 直属上级 → 部门总监 → 财务总监 → 财务审核。审批时效：每级审批不超过2个工作日。【依据：费用管理制度第7条】"},{"keywords":["预审","通过","结果"],"answer":"预审通过意味着所有规则校验均未触发预警或拦截，可以正式提交报销。通过状态表示金额在标准内、附件齐全、发票无重复、费用类型一致等。通过后系统自动生成预审说明，可作为报销凭证附件。【依据：预审规则说明】"},{"keywords":["预审","预警","警告"],"answer":"预审预警表示部分规则触发警告（如金额超标、报销超期等），但不阻止提交。预警项目需关注并在必要时补充说明或材料。建议根据预警提示进行补正后再提交，可提高审批通过率。【依据：预审规则说明】"},{"keywords":["预审","拦截","阻止"],"answer":"预审拦截表示存在严重问题（如附件缺失、发票重复等），必须修改后才能提交。拦截项会在预审结果中明确标注原因和所需操作。请根据提示补充材料或修改信息后重新预审。【依据：预审规则说明】"},{"keywords":["火车","高铁","标准"],"answer":"火车/高铁标准：二等座及以下实报实销，一等座需P7及以上职级或4小时以上车程。需提供购票发票或电子客票。改签/退票费可报销但需说明原因。【依据：差旅费用管理制度第3.3条】"}];
var faqKnowledgeBase = [{"q":"差旅交通费的报销标准是什么？","a":"国内差旅交通费标准为3000元/次以内，国际差旅根据目的地另行规定。机票需提供行程单，火车票/打车需提供有效发票。P7及以上职级出差可坐商务舱（4小时以上航班）。通过公司指定平台订票可直报。"},{"q":"差旅报销需要行程单吗？","a":"是的，机票报销必须提供行程单（航空运输电子客票行程单）。火车票需提供纸质或电子客票。行程单上的乘客姓名须与报销人一致，如为代订票需附说明。"},{"q":"出差需要提前申请吗？","a":"是的，出差前须提交出差申请单，经直属上级审批通过后方可出差。出差申请单需包含：出差目的地、事由、时间、预估费用。紧急出差可先口头报备，出差后3个工作日内补交申请单。"},{"q":"差旅费超标怎么办？","a":"差旅费超标分为两种情况：①金额超标——需提交超标说明，说明原因（如临时改签、紧急出行等），经直属上级审批；②附件不全——需补充相关材料。建议出差前了解标准，合理规划费用。"},{"q":"国际差旅报销有什么特殊要求？","a":"国际差旅报销需提供：①护照首页及签证页复印件 ②行程单/登机牌 ③境外消费发票（需附中文翻译和汇率说明） ④国际出差申请单。汇率按费用发生当月1日央行中间价折算，超过90天未报销需总经理审批。"},{"q":"住宿费的报销标准是多少？","a":"住宿费标准为600元/晚。一线城市（北京/上海/广州/深圳）可上浮20%即720元/晚，新一线城市（杭州/成都/南京等）上浮10%即660元/晚。需提供酒店水单或住宿发票。"},{"q":"住宿费超标了怎么处理？","a":"住宿费超标需提交超标说明，注明原因（如旺季/展会/房源紧张等），经直属上级审批。超标超过50%（即900元以上）需部门总监审批。建议提前预订酒店，避免旺季高价。"},{"q":"酒店水单是什么？怎么获取？","a":"酒店水单是酒店出具的住宿消费明细单，包含入住/退房日期、房费、房型等信息。入住时可在前台要求开具，或退房时在酒店前台打印。水单是住宿报销的必要附件。"},{"q":"不同城市的住宿标准有差异吗？","a":"有差异。一线城市（北京/上海/广州/深圳）上限720元/晚；新一线城市（杭州/成都/南京/武汉/重庆/西安/苏州/天津/长沙/郑州）上限660元/晚；其他城市上限600元/晚。旺季（法定节假日/展会期间）可再上浮10%。"},{"q":"旺季出差住宿费超标可以报销吗？","a":"可以，但需满足条件：①在超标说明中注明具体展会名称或旺季时段 ②附酒店价格截图作为参考依据 ③旺季上浮上限为标准的10%。一线城市旺季最高792元/晚，其他城市最高660元/晚。"},{"q":"客户招待费的限额是多少？","a":"客户招待费限额1000元/次，人均不超过200元。超过限额需部门负责人审批。招待前须向直属上级报备，金额超过500元需书面事前申请。"},{"q":"招待费人均标准怎么计算？","a":"人均标准=发票总额÷参与总人数（我方+客户方）。例如发票800元，共4人参与，人均200元，刚好达标。超过人均200元需在报销时说明原因。注意内部聚餐不得以招待费名义报销。"},{"q":"招待费报销需要哪些材料？","a":"客户招待费报销必须提供五项材料：①合规发票 ②客户名称及所属公司 ③参与人员名单（含我方和客户方人员） ④招待事由说明 ⑤人均金额计算说明。缺少任何一项将触发预审拦截。"},{"q":"招待费需要事前申请吗？","a":"是的。招待前须向直属上级口头或书面报备，说明招待对象、事由和预估金额。金额超过500元需书面事前申请并经部门负责人审批。紧急情况可先招待后补申请，但须在3个工作日内补交。"},{"q":"招待费有哪些禁止事项？","a":"以下情况禁止以招待费报销：①内部员工聚餐 ②私人宴请 ③高档娱乐场所消费 ④无实际业务往来的招待 ⑤拆分发票规避限额。违反规定将退回报销申请并纳入个人报销信用记录。"},{"q":"办公采购的报销标准是什么？","a":"办公采购标准：单次采购1000元以内由部门负责人审批，1000-5000元需行政部审批，5000元以上需总经理审批。所有采购需在审批通过后方可执行。报销必须三单齐全：采购审批单、发票、验收单。"},{"q":"什么是三单齐全？","a":"三单齐全是指办公采购报销必须同时具备：①采购审批单（事前审批，包含采购物品明细、预算金额） ②发票（合规增值税发票，信息与采购审批单一致） ③验收单（收货确认，包含物品名称、数量、规格、验收人签字）。缺一不可。"},{"q":"采购验收怎么做？","a":"收到货物后须在3个工作日内完成验收。验收步骤：①核对物品名称、数量、规格是否与采购审批单一致 ②检查物品质量是否合格 ③填写验收单并签字确认。验收不合格须办理退换货。"},{"q":"采购报销需要填写成本中心吗？","a":"是的，所有采购报销必须填写项目编号或成本中心归属。用于费用分摊和预算管控。如果不确定自己的成本中心，请咨询部门助理或财务部门。"},{"q":"办公采购超预算怎么办？","a":"采购超预算需重新提交采购申请，附超预算说明并经上级审批。建议采购前核实预算余额，合理规划采购计划。年度预算总额超支将影响部门下一年度预算额度。"},{"q":"预审的规则有哪些？","a":"预审包含8项规则：R001金额标准校验、R002附件完整性校验、R003发票重复校验、R004费用类型与发票内容一致性校验、R005报销周期校验、R006预算/项目归属校验、R007特殊审批判断、R008异常模式识别。每条规则会根据检查结果给出通过/预警/拦截状态。"},{"q":"预审被拦截了怎么办？","a":"预审被拦截说明存在严重问题，须根据拦截原因处理：①附件缺失（R002）——补充上传对应附件 ②发票重复（R003）——核实发票是否已报销，确认未报销请联系财务 ③其他拦截——查看具体规则说明并按要求修改。修改后可重新预审。"},{"q":"预审出现预警需要修改吗？","a":"预警不强制修改，但建议关注。常见预警：①金额超标（R001）——建议提交超标说明 ②报销超期（R005）——建议附延期说明 ③需特殊审批（R007）——建议发起特殊审批。预警项目可继续提交，但可能影响审批通过率。"},{"q":"预审通过后可以修改吗？","a":"预审通过后如果修改了报销信息（如金额、附件等），需要重新发起预审。建议确认信息无误后再正式提交。预审通过后系统会生成预审说明，可作为报销凭证附件。"},{"q":"预审不通过可以重新提交吗？","a":"可以。预审不通过后可根据提示修改信息或补充材料，然后重新发起预审。没有提交次数限制。建议每次预审后认真阅读命中规则的说明，针对性修改后再重新预审。"},{"q":"报销周期是多久？","a":"费用发生后须在30天内提交报销申请。超过30天需提供延期说明并经部门负责人审批。超过90天原则上不予报销，特殊情况需总经理审批。建议在费用发生后尽快提交。"},{"q":"报销审批流程是怎样的？","a":"审批流程按金额和类型分级：①普通报销（≤标准）→ 直属上级审批 → 财务审核；②超标报销 → 直属上级 → 部门负责人 → 财务审核；③特殊审批 → 直属上级 → 部门总监 → 财务总监 → 财务审核。每级审批不超过2个工作日。"},{"q":"发票信息识别不准确怎么办？","a":"OCR识别后可在字段确认环节手动修改。点击对应字段即可编辑。请仔细核对发票号码、金额、日期、销售方名称等关键信息，确保与发票原件一致。修改完成后确认提交即可。"},{"q":"报销单可以暂存草稿吗？","a":"可以。在预审结果页面选择【暂存草稿】，报销单将保存为草稿状态，可随时继续编辑。草稿不会进入审批流程，也不会占用预算。建议信息填写完整后再正式提交。"},{"q":"报销款多久能到账？","a":"报销审批通过后，财务将在5个工作日内完成打款。打款至报销人的工资卡账户。如超过5个工作日未到账，请联系财务部门查询。节假日期间打款时间可能顺延。"}];
var MOCK_POLICIES = [{"title":"差旅费用管理制度","tag":"费用标准","content":"<h4>第一章 总则</h4><p>为规范公司差旅费用管理，控制成本，特制定本制度。适用于全体员工因公出差产生的交通、住宿、餐饮等费用。</p><h4>第二章 交通费标准</h4><ul><li>国内交通费：3000元/次以内</li><li>机票标准：P5及以下经济舱，P6-P7经济舱（4小时以上可申请商务舱），P8及以上商务舱</li><li>火车/高铁标准：二等座及以下实报实销，一等座需P7及以上或4小时以上车程</li><li>市内交通：出差地市内交通费实报实销，需提供发票</li><li>国际差旅：经济舱实报实销，需提供行程单和登机牌</li></ul><h4>第三章 出差申请</h4><ul><li>出差前须提交出差申请单，包含目的地、事由、时间、预估费用</li><li>经直属上级审批通过后方可出差</li><li>紧急出差可先口头报备，出差后3个工作日内补交申请单</li></ul><h4>第四章 报销要求</h4><ul><li>费用发生后30天内提交报销</li><li>须提供行程单/客票、发票、出差申请单</li><li>超标需提交超标说明并经上级审批</li></ul>"},{"title":"住宿费用管理制度","tag":"费用标准","content":"<h4>第一章 标准</h4><ul><li>住宿费标准：600元/晚以内</li><li>一线城市（北京/上海/广州/深圳）：上浮20%，上限720元/晚</li><li>新一线城市（杭州/成都/南京/武汉/重庆/西安/苏州/天津/长沙/郑州）：上浮10%，上限660元/晚</li><li>其他城市：维持600元/晚标准</li></ul><h4>第二章 旺季上浮</h4><ul><li>旺季/展会期间可额外上浮10%</li><li>一线城市旺季最高：792元/晚</li><li>其他城市旺季最高：660元/晚</li><li>需注明具体展会名称或旺季时段，附酒店价格截图</li></ul><h4>第三章 超标处理</h4><ul><li>超标需提交超标说明，注明原因（旺季/展会/房源紧张等）</li><li>经直属上级审批后方可报销</li><li>超标超过50%（900元以上）需部门总监审批</li></ul><h4>第四章 附件要求</h4><ul><li>须提供酒店水单或住宿发票</li><li>入住/退房日期需明确</li><li>城市信息需与出差申请单一致</li></ul>"},{"title":"客户招待费用管理制度","tag":"费用标准","content":"<h4>第一章 标准</h4><ul><li>招待费限额：1000元/次以内</li><li>人均标准：不超过200元/人</li><li>超过500元需书面事前申请</li></ul><h4>第二章 事前申请</h4><ul><li>招待前须向直属上级报备（口头或书面）</li><li>说明招待对象、事由和预估金额</li><li>紧急情况可先招待后补申请（3个工作日内）</li></ul><h4>第三章 报销材料</h4><ul><li>合规发票</li><li>客户名称及所属公司</li><li>参与人员名单（我方+客户方）</li><li>招待事由说明</li><li>人均金额计算说明</li></ul><h4>第四章 禁止事项</h4><ul><li>不得报销内部员工聚餐</li><li>不得报销私人宴请</li><li>不得报销高档娱乐场所消费</li><li>不得拆分发票规避限额</li><li>违规将退回申请并纳入个人信用记录</li></ul>"},{"title":"办公采购管理制度","tag":"费用标准","content":"<h4>第一章 审批权限</h4><ul><li>单次采购≤1000元：部门负责人审批</li><li>1000-5000元：行政部审批</li><li>>5000元：总经理审批</li><li>所有采购须审批通过后方可执行</li></ul><h4>第二章 三单要求</h4><ul><li>采购审批单：事前审批，含物品明细和预算</li><li>发票：合规增值税发票，信息与采购审批单一致</li><li>验收单：收货确认，含物品名称、数量、规格、验收人签字</li><li>三单缺一不可，否则触发预审拦截</li></ul><h4>第三章 验收流程</h4><ul><li>收货后3个工作日内完成验收</li><li>核对物品名称、数量、规格</li><li>检查物品质量</li><li>填写验收单并签字确认</li><li>不合格物品办理退换货</li></ul><h4>第四章 预算管理</h4><ul><li>所有采购须填写项目编号或成本中心</li><li>超预算需重新提交申请并附超预算说明</li><li>年度超支影响下一年度预算额度</li></ul>"},{"title":"发票管理规范","tag":"发票管理","content":"<h4>第一章 发票要求</h4><ul><li>须为合规增值税发票</li><li>接受增值税专用发票和增值税电子普通发票</li><li>纸质发票需扫描上传，电子发票需上传PDF原件</li><li>发票信息须完整清晰（号码、日期、销售方、金额等）</li></ul><h4>第二章 重复校验</h4><ul><li>系统自动校验发票号码</li><li>重复发票触发拦截（规则R003）</li><li>每张发票仅可报销一次</li><li>确认未报销过的请联系财务核实</li></ul><h4>第三章 校验码</h4><ul><li>校验码是发票真伪核验的重要依据</li><li>系统自动提取校验码进行格式校验</li><li>OCR未识别到校验码时需手动补充</li><li>校验码不完整可能影响审核进度</li></ul><h4>第四章 存档要求</h4><ul><li>电子发票须保留PDF原件</li><li>纸质发票扫描件须清晰可读</li><li>发票开具后30天内须提交报销</li><li>超过30天需附延期说明</li></ul>"},{"title":"报销周期与时效管理制度","tag":"流程规范","content":"<h4>第一章 报销周期</h4><ul><li>费用发生后须在30天内提交报销申请</li><li>超过30天需提供延期说明并经部门负责人审批</li><li>超过90天原则上不予报销，特殊情况需总经理审批</li></ul><h4>第二章 审批时效</h4><ul><li>每级审批不超过2个工作日</li><li>超过时效系统自动提醒审批人</li><li>紧急报销可申请加急审批</li></ul><h4>第三章 打款时效</h4><ul><li>审批通过后5个工作日内完成打款</li><li>打款至报销人工资卡账户</li><li>节假日顺延</li><li>超5个工作日未到账可联系财务查询</li></ul>"},{"title":"特殊审批管理制度","tag":"流程规范","content":"<h4>第一章 适用场景</h4><ul><li>金额超标（超出费用标准）</li><li>附件不全但情况特殊（如出差地无法开具发票）</li><li>超期报销（超过30天）</li><li>其他需上级裁决的特殊情况</li></ul><h4>第二章 发起方式</h4><ul><li>在预审结果页面点击【发起特殊审批】</li><li>填写审批原因和详细说明</li><li>附相关佐证材料</li></ul><h4>第三章 审批流程</h4><ul><li>直属上级 → 部门总监 → 财务总监</li><li>每级审批不超过2个工作日</li><li>审批通过后可继续提交报销</li><li>审批驳回需修改后重新预审</li></ul>"},{"title":"费用报销禁止事项清单","tag":"禁止事项","content":"<h4>严格禁止以下报销行为：</h4><ul><li>使用虚假发票或篡改发票信息</li><li>同一张发票多次报销</li><li>将私人消费以公费名义报销</li><li>拆分发票规避金额标准（如将1200元拆为两次600元）</li><li>内部聚餐以客户招待费名义报销</li><li>无实际业务发生的虚假报销</li><li>虚报参与人员数量降低人均金额</li><li>跨年度报销（上一年度费用在次年报销）</li></ul><h4>违规处理：</h4><ul><li>首次违规：退回报销申请，书面警告</li><li>二次违规：退回报销申请，通报批评</li><li>三次及以上：退回报销申请，纳入个人信用记录，影响晋升和绩效</li><li>涉及金额较大或性质恶劣：移交合规部门处理</li></ul>"}];
var PRECHECK_RULE_KB = [{"rule_id":"R001","rule_name":"金额标准校验","trigger":"报销金额超过对应费用类型的标准限额","limits":{"差旅交通费":3000,"交通费":2000,"住宿费":600,"餐饮费":500,"客户招待费":1000,"招待费":1000,"办公采购":1000},"pass_logic":"金额 ≤ 标准限额 → 通过，显示实际金额与标准对比","warning_logic":"金额 > 标准限额 → 预警，提示超出金额，要求提交超标说明或发起特殊审批","block_logic":"金额超过标准限额的200% → 拦截（预留，当前为预警）","policy_ref":"费用管理制度第3条","user_explain":"您的报销金额{fact}元，超过了{expenseType}的标准限额{standard}元，超出{gap}。请提交超标说明或调整金额后重新预审。","correction":"可采取以下措施：①调整报销金额至标准以内 ②提交超标说明并经上级审批 ③发起特殊审批。如金额确实超标且原因合理，建议提交超标说明。"},{"rule_id":"R002","rule_name":"附件完整性校验","trigger":"报销单缺少必填附件材料","pass_logic":"所有必填附件状态为\"已上传\"或\"已确认\" → 通过","warning_logic":"缺少选填附件 → 提示补充（预留）","block_logic":"缺少任何必填附件 → 拦截，列出缺失材料名称","policy_ref":"附件管理制度","user_explain":"您的报销缺少以下必填材料：{missing}。请补充完整后再提交。不同费用类型要求的附件不同，请确认您已上传所有必要材料。","correction":"请根据费用类型补充对应材料：差旅交通费需发票+行程单+出差申请单；住宿费需发票+水单+城市信息；客户招待费需发票+客户名称+参与人员+事由+人均说明；办公采购需发票+采购审批+验收单。"},{"rule_id":"R003","rule_name":"发票重复校验","trigger":"发票号码在系统中已存在（已报销过）","pass_logic":"发票号码在系统中唯一 → 通过","warning_logic":"（无预警状态）","block_logic":"发票号码已存在 → 拦截，显示重复发票号码","policy_ref":"发票管理规范第2条","user_explain":"系统检测到发票号码{invoiceNumber}已存在，该发票可能已报销过。重复发票将触发拦截，请核实。如确认未报销过，请联系财务部门核实。","correction":"请检查：①该发票是否已在其他报销单中使用 ②是否误传了相同发票 ③如确认未报销过，联系财务核实（可能是其他同事已报销该发票）。核实后更换发票或联系财务处理。"},{"rule_id":"R004","rule_name":"费用类型与发票内容一致性校验","trigger":"报销的费用类型与发票销售方名称不匹配","pass_logic":"销售方名称包含对应费用类型的关键词 → 通过","warning_logic":"（无预警状态）","block_logic":"（无拦截状态，为信息提示）","info_logic":"无法自动判断一致性 → 信息提示，建议人工确认","policy_ref":"报销审核规则","user_explain":"系统无法自动判断发票销售方\"{sellerName}\"与费用类型\"{expenseType}\"是否一致。请人工确认发票内容是否与所选费用类型匹配，确认后可继续提交。","correction":"请检查：①费用类型是否选择正确 ②发票是否属于该费用类型 ③如发票内容与费用类型不符，请修改费用类型或更换发票。"},{"rule_id":"R005","rule_name":"报销周期校验","trigger":"费用发生日期距离提交日期超过30天","pass_logic":"费用发生日期距今 ≤ 30天 → 通过","warning_logic":"超过30天 → 预警，提示超期天数，要求提供延期说明","block_logic":"超过90天 → 拦截（预留，当前为预警）","policy_ref":"费用管理制度第6条","user_explain":"费用发生日期为{expenseDate}，距今{days}天，已超过30天报销周期。请提供延期说明（说明延期原因如出差在外、生病等），经部门负责 async function loadKnowledgeBases() {
  try {
    var files = {
      'data/attachmentChecklists.json': 'ATTACHMENT_CHECKLISTS',
      'data/keywordAnswerCache.json': 'keywordAnswerCache',
      'data/faqKnowledgeBase.json': 'faqKnowledgeBase',
      'data/mockPolicies.json': 'MOCK_POLICIES',
      'data/precheckRuleKB.json': 'PRECHECK_RULE_KB',
      'data/attachmentRuleKB.json': 'ATTACHMENT_RULE_KB',
      'data/mockReimbursements.json': 'allReimbursements',
      'data/todoList.json': 'TODO_LIST',
      'data/synonymDict.json': 'SYNONYM_DICT'
    };
    var keys = Object.keys(files);
    var results = await Promise.all(keys.map(function(url) {
      return fetch(url).then(function(r){ return r.json(); }).catch(function(e){
        return null;
      });
    }));
    var loaded = 0;
    results.forEach(function(data, i) {
      if (data) { window[files[keys[i]]] = data; loaded++; }
    });
    if (loaded === keys.length) {
      console.log('[知识库] 已从 JSON 文件加载全部 ' + loaded + ' 个数据文件');
    } else if (loaded > 0) {
      console.log('[知识库] 部分加载 ' + loaded + '/' + keys.length + '，其余使用内嵌数据');
    } else {
      console.log('[知识库] fetch 不可用，已使用内嵌兜底数据（file:// 模式）');
    }
  } catch(e) {
    console.log('[知识库] 使用内嵌兜底数据（file:// 模式）');
  }
}

function mockSimilarity(q1, q2) {
  q1 = q1.toLowerCase(); q2 = q2.toLowerCase();
  var set1 = new Set(q1.split("")), set2 = new Set(q2.split(""));
  var inter = 0; set1.forEach(function(c){ if(set2.has(c)) inter++; });
  var union = new Set(Array.from(set1).concat(Array.from(set2))).size;
  var charSim = union > 0 ? inter / union : 0;
  var synBoost = 0;
  Object.keys(SYNONYM_DICT).forEach(function(key){
    var syns = SYNONYM_DICT[key];
    var hasInQ1 = syns.some(function(s){ return q1.indexOf(s)>=0; }) || q1.indexOf(key)>=0;
    var hasInQ2 = syns.some(function(s){ return q2.indexOf(s)>=0; }) || q2.indexOf(key)>=0;
    if (hasInQ1 && hasInQ2) synBoost += 0.08;
  });
  return Math.min(charSim + synBoost, 1.0);
}

   AGENTIC RAG TOOLS (确定性工具函数，不调用 LLM)
   ============================================================ */
var AGENT_TOOLS = {
  keyword_search: function(query) {
    var cacheHit = null, bestCoverage = 0;
    for (var i = 0; i < keywordAnswerCache.length; i++) {
      var entry = keywordAnswerCache[i];
      var coverage = 0;
      entry.keywords.forEach(function(kw){ if(query.indexOf(kw)>=0) coverage++; });
      var ratio = coverage / entry.keywords.length;
      if (coverage >= 2 && ratio > bestCoverage) { bestCoverage = ratio; cacheHit = entry; }
      if (ratio >= 0.9) { cacheHit = entry; break; }
    }
    return cacheHit ? {found:true, answer:cacheHit.answer} : {found:false};
  },

  faq_search: function(query) {
    var bestFaq = null, bestSim = 0;
    for (var j = 0; j < faqKnowledgeBase.length; j++) {
      var sim = mockSimilarity(query, faqKnowledgeBase[j].q);
      if (sim > bestSim) { bestSim = sim; bestFaq = faqKnowledgeBase[j]; }
    }
    return bestSim >= 0.7 ? {found:true, faq:bestFaq, similarity:bestSim} : {found:false, best_similarity:bestSim};
  },

  policy_search: function(query) {
    var results = [];
    MOCK_POLICIES.forEach(function(p){
      var titleSim = mockSimilarity(query, p.title);
      var tagSim = mockSimilarity(query, p.tag) * 0.5;
      var plainContent = p.content.replace(/<[^>]+>/g, "").substring(0, 200);
      var contentSim = mockSimilarity(query, plainContent) * 0.3;
      var s = Math.max(titleSim, tagSim, contentSim);
      if (s > 0.4) results.push({title:p.title, tag:p.tag, content_preview:plainContent.substring(0,150), score:s});
    });
    results.sort(function(a,b){ return b.score - a.score; });
    return results.slice(0,3);
  },

  precheck_rule_search: function(query) {
    var results = [];
    PRECHECK_RULE_KB.forEach(function(rule){
      var s = mockSimilarity(query, rule.rule_name + " " + rule.rule_id);
      if (/R00[1-8]/.test(query) && query.indexOf(rule.rule_id) >= 0) s = 0.95;
      if (s > 0.4) results.push({rule_id:rule.rule_id, rule_name:rule.rule_name, trigger:rule.trigger, limits:rule.limits, user_explain:rule.user_explain, correction:rule.correction, score:s});
    });
    results.sort(function(a,b){ return b.score - a.score; });
    return results.slice(0,3);
  },

  attachment_rule_search: function(query, expenseType) {
    var results = [];
    var et = expenseType || currentExpenseType || "";
    ATTACHMENT_RULE_KB.forEach(function(ar){
      var s = mockSimilarity(query, ar.expenseType + " " + ar.description);
      if (et && ar.expenseType === et) s = Math.max(s, 0.8);
      if (s > 0.4) {
        results.push({
          expenseType:ar.expenseType,
          required:ar.required.map(function(r){return r.name+"("+r.format+")";}).join(", "),
          optional:ar.optional.map(function(r){return r.name;}).join(", "),
          missing_handling:ar.missing_handling,
          score:s
        });
      }
    });
    results.sort(function(a,b){ return b.score - a.score; });
    return results.slice(0,3);
  },

  get_current_receipt: function() {
    return currentOcrData ? {found:true, receipt:currentOcrData} : {found:false};
  },

  get_precheck_result: function() {
    return currentPrecheckResult ? {found:true, result:currentPrecheckResult.result, risk_score:currentPrecheckResult.risk_score, hit_rules:currentPrecheckResult.hit_rules||[]} : {found:false};
  },

  get_attachment_status: function() {
    var checklist = ATTACHMENT_CHECKLISTS[currentExpenseType] || [];
    var missing = [], uploaded = [];
    checklist.forEach(function(item){
      if (item.status === "已上传" || item.status === "已确认") uploaded.push(item.name);
      else if (item.required) missing.push(item.name);
    });
    return {expenseType:currentExpenseType, total:checklist.length, uploaded:uploaded, missing:missing, allComplete:missing.length===0};
  }
};

var AGENT_SYSTEM_PROMPT = "你是费用报销助手。先调工具获取数据，再回答。不编造数据。\n\n输出格式（严格遵守）：\n- 每个要点单独一行\n- 每行以 **加粗小标题** 开头，后跟具体内容\n- 不要输出思考过程\n- 只回答用户问的内容，不要展开无关信息\n- 示例：\n  **缺失材料** 行程单、出差申请单\n  **住宿标准** 北京/上海/广州/深圳上限600元/晚\n\n场景→工具（优先用前面的）：\n- 用户问还差什么材料/缺什么 → 优先调 get_attachment_status（返回当前单据实际缺失），只在用户问通用规则时才调 attachment_rule_search\n- 制度/标准咨询 → faq_search, policy_search\n- 预审结果解释 → get_current_receipt, get_precheck_result, precheck_rule_search\n- 补正建议 → get_current_receipt, get_precheck_result, precheck_rule_search\n- 操作流程 → faq_search, policy_search\n\n规则：\n- 只基于工具返回的数据回答\n- 用户问缺什么，就只列出缺失项，不要列出已上传的\n- 金额/标准必须引用精确数字\n- 不确定就说不确定";

// 支持 tool_use 的 LLM 调用（新增，不替代 callLLM）
async function callLLMWithTools(messages, tools) {
  var cfg = getApiConfig();
  if (!cfg.llmBaseUrl || !cfg.llmApiKey) return {ok:false, error:"Not configured"};
  try {
    var history = getHistoryMessages();
    var finalMessages = [];
    for (var mi = 0; mi < messages.length; mi++) {
      finalMessages.push(messages[mi]);
      if (messages[mi].role === "system" && history.length > 0) {
        history.forEach(function(h) { finalMessages.push(h); });
      }
    }
    var payload = {
      model: cfg.llmModel || "glm-5.1",
      messages: finalMessages,
      temperature: 0.2,
      max_tokens: 4096
    };
    if (tools && tools.length > 0) payload.tools = tools;
    console.log("[Agent LLM调用] 工具数: " + (tools?tools.length:0) + ", 历史轮数: " + Math.floor(history.length/2));
    var resp = await callConfiguredApi("llm", payload);
    if (resp.ok && resp.data && resp.data.choices && resp.data.choices[0]) {
      var choice = resp.data.choices[0];
      var hasToolCalls = !!(choice.message && choice.message.tool_calls && choice.message.tool_calls.length > 0);
      console.log("[Agent LLM] " + (hasToolCalls ? "工具调用" : "直接回答") + " finish_reason=" + choice.finish_reason);
      return {ok:true, message:choice.message, finish_reason:choice.finish_reason || (hasToolCalls ? "tool_calls" : "stop")};
    }
    throw new Error("LLM响应格式错误");
  } catch(e) {
    console.error("[Agent LLM失败]", e.message);
    return {ok:false, error:e.message};
  }
}

// 【会调用 LLM】解释规则引擎输出的预审结果
async function llmExplainPrecheck(precheckResult) {
  // 构建精简的预审上下文：只传结论、命中规则、当前单据关键字段
  var hitRulesStr = (precheckResult.hit_rules||[]).map(function(r){
    return r.rule_id+" "+r.rule_name+": 实际值="+r.fact+", 标准="+r.standard+", 差异="+r.gap+", 建议="+r.required_action;
  }).join("\n");
  var receiptInfo = currentOcrData ? "费用类型="+currentOcrData.expenseType+", 金额="+(currentOcrData.totalAmount||currentOcrData.amount)+"元, 申请人="+(currentOcrData.applicant||"未知") : "无单据信息";

  var result = await callLLM([
    {role:"system",content:"你是报销预审助手。根据预审结果和单据信息，直接给出简洁明确的解释。\n\n输出格式（严格遵守）：\n- 每个要点单独一行，以 **加粗小标题** 开头\n- 示例：\n  **结论** 预审通过，有2条风险提示\n  **命中规则1** R003 超标住宿：实际700元，标准600元\n  **建议** 修改住宿金额或补充说明\n不要输出思考过程，直接回答。"},
    {role:"user",content:"预审结论: "+precheckResult.result+" (风险分:"+precheckResult.risk_score+")\n当前单据: "+receiptInfo+"\n命中规则:\n"+hitRulesStr+"\n\n请解释预审结果。"}
  ], {temperature:0.3, max_tokens:2048});
  if (result.ok && result.data && result.data.trim().length > 10) {
    return {summary:result.data, reason:"", risk_explanation:"", next_action:[], cannot_change:""};
  }
  // Fallback: 基于规则引擎结果生成确定性解释
  var summary = "预审结论：" + precheckResult.result + "（风险分" + precheckResult.risk_score + "）\n\n";
  (precheckResult.hit_rules||[]).forEach(function(r){ summary += "• "+r.rule_id+" "+r.rule_name+"："+r.gap+"，建议"+r.required_action+"\n"; });
  return {summary:summary, reason:"", risk_explanation:"", next_action:[], cannot_change:""};
}


/* ============================================================
   AGENTIC RAG — Agent Loop (纯Agentic架构，无固定管道)
   ============================================================ */
async function processQuestion(query) {
  // ========== 快速通道 1: 关键词缓存 (0次LLM) ==========
  var kwResult = AGENT_TOOLS.keyword_search(query);
  if (kwResult.found) return {answer:kwResult.answer, path:"关键词缓存", usedLLM:false, source:"关键词缓存匹配"};

  // ========== 快速通道 2: FAQ高相似度匹配 (0次LLM) ==========
  var faqResult = AGENT_TOOLS.faq_search(query);
  if (faqResult.found && faqResult.similarity >= 0.85) {
    return {answer:faqResult.faq.a, path:"FAQ匹配 (相似度:"+faqResult.similarity.toFixed(2)+")", usedLLM:false, source:"FAQ知识库"};
  }

  // ========== LLM 不可用时: Fallback 管道 ==========
  if (!isApiConfigured("llm")) {
    return agentFallback(query, faqResult);
  }

  // ========== Agentic RAG: Agent Loop (动态上下文注入) ==========
  // 构建动态系统提示：将当前单据/预审上下文注入 Agent 推理环境
  var dynamicContext = "";
  if (currentPrecheckResult) {
    dynamicContext = "\n\n【当前预审上下文】用户有正在处理的报销单，预审结果为" + currentPrecheckResult.result + "，风险分" + currentPrecheckResult.risk_score + "。命中规则: " + (currentPrecheckResult.hit_rules||[]).map(function(r){return r.rule_id+" "+r.rule_name;}).join("、") + "。关于此单据的问题，请先调用 get_current_receipt 和 get_precheck_result 获取详细信息，再结合 precheck_rule_search 回答。";
  } else if (currentOcrData) {
    dynamicContext = "\n\n【当前单据上下文】用户已上传报销单据，费用类型为" + currentOcrData.expenseType + "。关于此单据的问题，请调用 get_current_receipt 获取详细信息。";
  }

  var agentMessages = [
    {role:"system", content: AGENT_SYSTEM_PROMPT + dynamicContext},
    {role:"user", content: query}
  ];
  var toolsUsed = [];
  var MAX_AGENT_TURNS = 6;
  var MAX_REFLECTION_ROUNDS = 2;
  var reflectionCount = 0;

  for (var turn = 0; turn < MAX_AGENT_TURNS; turn++) {
    console.log("[Agent Loop] Turn " + (turn+1));
    var llmResult = await callLLMWithTools(agentMessages, AGENT_TOOL_DEFINITIONS);

    if (!llmResult.ok) {
      console.log("[Agent Loop] LLM失败，降级到fallback");
      return agentFallback(query, faqResult);
    }

    var finishReason = llmResult.finish_reason;
    var agentMsg = llmResult.message;

    // 将 Agent 的消息追加到对话历史
    agentMessages.push(agentMsg);

    // Case 1: Agent 直接回答（finish_reason === "stop"，无 tool_calls）
    if (finishReason === "stop" && !(agentMsg.tool_calls && agentMsg.tool_calls.length > 0)) {
      var content = agentMsg.content || "";
      console.log("[Agent Loop] 直接回答，toolsUsed: " + toolsUsed.join(","));

      // 简单质量检查：回答不能太短
      if (content.trim().length < 5 && reflectionCount < MAX_REFLECTION_ROUNDS) {
        reflectionCount++;
        agentMessages.push({role:"user", content: "回答太短，请重新回答，确保内容完整。"});
        continue;
      }

      // ===== 后处理：预审上下文 → 生成操作按钮 =====
      var precheckExtra = null;
      if (currentPrecheckResult && toolsUsed.length > 0) {
        var precheckTools = ['get_current_receipt','get_precheck_result','get_attachment_status','precheck_rule_search','attachment_rule_search'];
        var usedPrecheckTools = toolsUsed.filter(function(t){ return precheckTools.indexOf(t) >= 0; });
        if (usedPrecheckTools.length > 0) {
          var btnActions = [];
          if (currentPrecheckResult.result === "通过") btnActions = ["正式提交","暂存草稿"];
          else if (currentPrecheckResult.result === "预警") btnActions = ["补充说明","修改字段","重新预审"];
          else if (currentPrecheckResult.result === "拦截") btnActions = ["修改字段","补充附件","发起特殊审批","重新预审"];
          if (btnActions.length > 0) {
            precheckExtra = document.createElement("div");
            precheckExtra.className = "quick-actions";
            btnActions.forEach(function(b){
              var btn = document.createElement("button");
              btn.className = "btn btn-sm";
              btn.textContent = b;
              btn.onclick = function(){ document.getElementById("chatInput").value=b; sendMessage(); };
              precheckExtra.appendChild(btn);
            });
          }
        }
      }

      var pathTag = "Agentic RAG (工具:"+toolsUsed.join("+")+")";
      return {answer:content, path:pathTag, usedLLM:true, source:"Agent综合回答", extra:precheckExtra};
    }

    // Case 2: Agent 请求工具调用
    if (agentMsg.tool_calls && agentMsg.tool_calls.length > 0) {
      for (var tc = 0; tc < agentMsg.tool_calls.length; tc++) {
        var toolCall = agentMsg.tool_calls[tc];
        var funcName = toolCall.function.name;
        var funcArgs = {};
        try { funcArgs = JSON.parse(toolCall.function.arguments); } catch(e) {}
        console.log("[Agent Loop] 调用工具: " + funcName + " args=" + JSON.stringify(funcArgs).substring(0,100));
        toolsUsed.push(funcName);

        var toolOutput;
        try {
          if (AGENT_TOOLS[funcName]) {
            if (funcName === "attachment_rule_search") {
              toolOutput = AGENT_TOOLS[funcName](funcArgs.query || query, funcArgs.expenseType);
            } else if (funcName === "faq_search" || funcName === "policy_search" || funcName === "precheck_rule_search") {
              toolOutput = AGENT_TOOLS[funcName](funcArgs.query || query);
            } else {
              toolOutput = AGENT_TOOLS[funcName]();
            }
          } else {
            toolOutput = {error: "未知工具: " + funcName};
          }
        } catch(e) {
          toolOutput = {error: e.message};
        }

        agentMessages.push({
          role: "tool",
          tool_call_id: toolCall.id,
          content: JSON.stringify(toolOutput)
        });
      }
      // 继续循环，让 Agent 根据工具结果决定下一步
      continue;
    }

    // 兜底：其他情况直接返回内容
    return {answer:agentMsg.content||"抱歉，我暂时无法回答这个问题。", path:"Agent兜底", usedLLM:true, source:"Agent"};
  }

  // 超过最大轮次
  return {answer:"问题较复杂，Agent已达到最大推理轮次。请尝试简化问题或联系财务部门。", path:"Agent最大轮次", usedLLM:true, source:"Agent"};
}

/* ============================================================
   AGENTIC RAG — 回答质量自我评估 & 反思循环 (Reflexion)
   ============================================================ */

// Layer 1: 确定性质量检查（0成本，不调LLM）
function evaluateDeterministic(query, answer, toolsUsed) {
  var score = 0;
  var issues = [];
  var details = [];

  // 检查1: 回答长度（过短=质量差）
  if (answer.length < 15) { issues.push("回答过短，可能不完整"); }
  else if (answer.length < 50) { score += 10; details.push("长度一般"); }
  else { score += 20; details.push("长度充足"); }

  // 检查2: 是否包含具体数据（金额、规则ID、标准数值）
  var hasAmount = /\d+元|\d+\/|\d+%|\d+天|\d+次/.test(answer);
  var hasRuleId = /R00[1-8]/.test(answer);
  var hasStandard = /标准|限额|上限|额度|规定|制度/.test(answer);
  if (hasAmount || hasRuleId) { score += 25; details.push("含具体数据"); }
  else if (hasStandard) { score += 15; details.push("含制度引用"); }
  else { issues.push("回答缺少具体数据（金额/规则ID/标准数值）"); }

  // 检查3: 是否调用了工具（工具=事实依据）
  if (toolsUsed.length >= 2) { score += 20; details.push("调用"+toolsUsed.length+"个工具"); }
  else if (toolsUsed.length === 1) { score += 10; details.push("调用1个工具"); }
  else { issues.push("未调用任何知识工具，回答可能缺乏事实依据"); }

  // 检查4: 与用户问题的相关性（关键词重叠度）
  var queryChars = query.replace(/[？?。，！!、的了是在有和与我你他她它这那]/g, "").split("");
  var meaningfulChars = queryChars.filter(function(c){ return c.trim().length > 0; });
  if (meaningfulChars.length > 0) {
    var overlap = meaningfulChars.filter(function(c){ return answer.indexOf(c) >= 0; }).length;
    var relevanceRatio = overlap / meaningfulChars.length;
    if (relevanceRatio >= 0.5) { score += 20; details.push("问题相关度高"); }
    else if (relevanceRatio >= 0.3) { score += 10; details.push("问题相关度中等"); }
    else { issues.push("回答与问题相关性可能不足"); }
  } else { score += 10; }

  // 检查5: 是否包含"不确定""无法回答"等模糊表述
  if (/无法回答|不确定|信息不足|暂无/.test(answer) && !/建议|请|可以/.test(answer)) {
    score -= 10;
    issues.push("回答包含不确定性表述且未给出建议");
  }

  // 检查6: 是否给出了可操作的建议
  if (/建议|可以|请|需要|应当|下一步/.test(answer)) { score += 15; details.push("含可操作建议"); }

  score = Math.max(0, Math.min(100, score));
  return {
    score: score,
    level: score >= 75 ? "high" : score >= 50 ? "medium" : "low",
    issues: issues,
    details: details,
    pass: score >= 60
  };
}

// Layer 2: LLM 自评（可选，需要 LLM 配置）
async function evaluateWithLLM(query, answer, toolsUsed) {
  if (!isApiConfigured("llm")) return null;
  var toolInfo = toolsUsed.length > 0 ? "调用了工具: "+toolsUsed.join(", ") : "未调用工具";
  var result = await callLLM([
    {role:"system", content:"你是回答质量评估专家。评估以下回答的质量。评估维度：1.relevance(相关性0-10)回答是否切题 2.completeness(完整性0-10)信息是否充分 3.accuracy(准确性0-10)数据引用是否准确 4.clarity(清晰度0-10)表达是否清晰易懂 5.actionability(可操作性0-10)是否给出明确建议。返回JSON: {relevance:0,completeness:0,accuracy:0,clarity:0,actionability:0,overall:0,weakness:'',suggestion:''}"},
    {role:"user", content: "用户问题: "+query+"\n\n助手回答: "+answer+"\n\n"+toolInfo}
  ], {temperature:0.1, max_tokens:256});
  if (result.ok) {
    try { return JSON.parse(result.data); } catch(e) { return null; }
  }
  return null;
}

// 反思反馈生成：将评估结果注入 Agent 消息，促使其自我改进
function buildReflectionMessage(evalResult, llmEval, originalAnswer) {
  var feedback = "【自我评估反馈】你刚才的回答质量评估未达标，请根据以下反馈改进：\n";
  feedback += "- 确定性评分: " + evalResult.score + "/100 (" + (evalResult.pass ? "通过" : "未通过") + ")\n";
  if (evalResult.issues.length > 0) feedback += "- 问题: " + evalResult.issues.join("；") + "\n";
  if (llmEval) {
    var avg = Math.round((llmEval.relevance + llmEval.completeness + llmEval.accuracy + llmEval.clarity + llmEval.actionability) / 5);
    feedback += "- LLM综合评分: " + avg + "/10\n";
    if (llmEval.weakness) feedback += "- 主要不足: " + llmEval.weakness + "\n";
    if (llmEval.suggestion) feedback += "- 改进建议: " + llmEval.suggestion + "\n";
  }
  feedback += "\n请重新回答，确保：1.引用具体的数据和标准 2.基于工具返回的事实 3.给出明确可操作的建议";
  return feedback;
}

// 质量统计追踪（跨会话持久化到 localStorage）
var QUALITY_STATS_KEY = "agent_quality_stats";
function getQualityStats() {
  try { return JSON.parse(localStorage.getItem(QUALITY_STATS_KEY)) || {total:0,high:0,medium:0,low:0,reflections:0,avgScore:0,improvements:0}; }
  catch(e) { return {total:0,high:0,medium:0,low:0,reflections:0,avgScore:0,improvements:0}; }
}
function recordQuality(score, level, reflected, improved) {
  var stats = getQualityStats();
  stats.total++;
  stats[level]++;
  if (reflected) stats.reflections++;
  if (improved) stats.improvements++;
  stats.avgScore = Math.round(((stats.avgScore * (stats.total - 1)) + score) / stats.total);
  localStorage.setItem(QUALITY_STATS_KEY, JSON.stringify(stats));
  console.log("[质量统计] 当前avg=" + stats.avgScore + ", 总计=" + stats.total + ", 反思=" + stats.reflections + ", 改进=" + stats.improvements);
}

// Fallback 管道: LLM不可用时，用确定性逻辑回答
function agentFallback(query, faqResult) {
  var FALLBACK_MIN_SCORE = 0.7;
  // FAQ 模糊匹配（相似度 0.85+）
  if (faqResult && faqResult.found && faqResult.similarity >= 0.85) {
    return {answer:faqResult.faq.a, path:"FAQ模糊匹配 (相似度:"+faqResult.similarity.toFixed(2)+",LLM不可用)", usedLLM:false, source:"FAQ知识库"};
  }
  // 制度库搜索（Fallback 额外阈值 0.7，无 LLM 兜底需严格）
  var policyResults = AGENT_TOOLS.policy_search(query);
  if (policyResults.length > 0 && policyResults[0].score >= FALLBACK_MIN_SCORE) {
    var topPolicy = policyResults[0];
    return {answer:topPolicy.title+" ["+topPolicy.tag+"]: "+topPolicy.content_preview+"... (LLM不可用，显示检索摘要，详情请配置LLM API)", path:"制度库检索(无LLM, 阈值:"+FALLBACK_MIN_SCORE+")", usedLLM:false, source:"制度知识库"};
  }
  // 预审规则搜索
  var ruleResults = AGENT_TOOLS.precheck_rule_search(query);
  if (ruleResults.length > 0 && ruleResults[0].score >= FALLBACK_MIN_SCORE) {
    var topRule = ruleResults[0];
    return {answer:topRule.rule_id+" "+topRule.rule_name+": "+topRule.user_explain+" (LLM不可用，显示规则摘要)", path:"规则库检索(无LLM, 阈值:"+FALLBACK_MIN_SCORE+")", usedLLM:false, source:"预审规则库"};
  }
  // 附件规则搜索
  var attachResults = AGENT_TOOLS.attachment_rule_search(query);
  if (attachResults.length > 0 && attachResults[0].score >= FALLBACK_MIN_SCORE) {
    var topAttach = attachResults[0];
    return {answer:topAttach.expenseType+"报销所需附件: "+topAttach.required+" (LLM不可用，显示附件规则摘要)", path:"附件规则检索(无LLM, 阈值:"+FALLBACK_MIN_SCORE+")", usedLLM:false, source:"附件规则库"};
  }
  return {answer:"当前信息不足以回答您的问题（LLM API未配置，无法生成智能回答）。请尝试：1.配置LLM API以启用智能问答；2.提供更具体的费用类型或关键词；3.联系财务部门获取帮助。", path:"信息不足(无LLM)", usedLLM:false, source:"无匹配结果"};
}

function createStepIndicator(currentStep) {
  var steps = ["单据进入","OCR识别","字段确认","附件检查","规则预审","纠错提交"];
  var div = document.createElement("div");
  div.className = "step-indicator";
  steps.forEach(function(s, i){
    var dot = document.createElement("span");
    dot.className = "step-dot" + (i < currentStep ? " done" : i === currentStep ? " active" : "");
    dot.textContent = (i+1) + "." + s;
    div.appendChild(dot);
  });
  return div;
}

var uploadedFileBase64 = null;
var uploadedFileType = null;

function readFileAsBase64(file) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function() { resolve(reader.result); };
    reader.onerror = function() { reject(new Error("文件读取失败")); };
    reader.readAsDataURL(file);
  });
}

function pdfPageToImage(arrayBuffer) {
  return new Promise(function(resolve, reject) {
    if (typeof pdfjsLib === 'undefined') { reject(new Error("PDF.js未加载")); return; }
    var task = pdfjsLib.getDocument({data: arrayBuffer});
    task.promise.then(function(pdf) {
      pdf.getPage(1).then(function(page) {
        var scale = 1.5;
        var viewport = page.getViewport({scale: scale});
        var maxDim = 1600;
        if (viewport.width > maxDim || viewport.height > maxDim) {
          var ratio = maxDim / Math.max(viewport.width, viewport.height);
          viewport = page.getViewport({scale: scale * ratio});
        }
        var canvas = document.createElement("canvas");
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        var ctx = canvas.getContext("2d");
        page.render({canvasContext: ctx, viewport: viewport}).promise.then(function() {
          var base64 = canvas.toDataURL("image/jpeg", 0.85);
          resolve(base64);
        }).catch(reject);
      }).catch(reject);
    }).catch(reject);
  });
}

function compressBase64Image(base64DataUrl, maxKB) {
  return new Promise(function(resolve) {
    var img = new Image();
    img.onload = function() {
      var maxDim = 1600;
      var w = img.width, h = img.height;
      if (w > maxDim || h > maxDim) {
        var ratio = maxDim / Math.max(w, h);
        w = Math.round(w * ratio);
        h = Math.round(h * ratio);
      }
      var canvas = document.createElement("canvas");
      canvas.width = w;
      canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      var result = canvas.toDataURL("image/jpeg", 0.8);
      resolve(result);
    };
    img.onerror = function() { resolve(base64DataUrl); };
    img.src = base64DataUrl;
  });
}

async function handleFileUpload(event) {
  var file = event.target.files[0];
  if (!file) return;

  var validTypes = ["image/png","image/jpeg","image/jpg","application/pdf"];
  if (validTypes.indexOf(file.type) < 0) {
    showToast("当前仅支持PDF、PNG、JPG、JPEG格式发票", "warning");
    event.target.value = "";
    return;
  }

  if (file.size > 10 * 1024 * 1024) {
    showToast("文件过大（超过10MB），请上传更小的文件", "warning");
    event.target.value = "";
    return;
  }

  addUserMessage("上传了文件: " + file.name);

  try {
    var base64Data;
    if (file.type === "application/pdf") {
      var arrayBuffer = await file.arrayBuffer();
      try {
        base64Data = await pdfPageToImage(arrayBuffer);
        uploadedFileType = "image/jpeg";
      } catch(e) {
        showToast("PDF解析失败，请尝试上传图片格式发票", "error");
        event.target.value = "";
        return;
      }
    } else {
      base64Data = await readFileAsBase64(file);
      uploadedFileType = file.type;
      if (file.size > 3 * 1024 * 1024) {
        base64Data = await compressBase64Image(base64Data);
        uploadedFileType = "image/jpeg";
      }
    }

    var base64Prefix = "data:" + uploadedFileType + ";base64,";
    if (base64Data.indexOf(base64Prefix) === 0) {
      uploadedFileBase64 = base64Data.substring(base64Prefix.length);
    } else if (base64Data.indexOf("data:image/") === 0) {
      var commaIdx = base64Data.indexOf(",");
      uploadedFileBase64 = commaIdx >= 0 ? base64Data.substring(commaIdx + 1) : base64Data;
    }

    var type = "差旅交通费";
    if (file.name.indexOf("住宿")>=0) type = "住宿费";
    else if (file.name.indexOf("招待")>=0||file.name.indexOf("餐饮")>=0) type = "客户招待费";
    else if (file.name.indexOf("采购")>=0||file.name.indexOf("办公")>=0) type = "办公采购";
    startFlow(type);
  } catch(e) {
    showToast("文件处理失败: " + e.message, "error");
  }
  event.target.value = "";
}

var ocrUsedRealApi = false;

async function performOCR(type) {
  var data = JSON.parse(JSON.stringify(MOCK_OCR_DATA[type] || {}));
  if (!MOCK_OCR_DATA[type]) { addBotMessage("未找到该费用类型的模拟数据。"); return; }

  ocrUsedRealApi = false;

  if (uploadedFileBase64) {
    var isFileMode = (location.protocol === 'file:');
    if (isFileMode) {
      showToast("本地模式下使用演示数据（启动 node server.js 可启用真实OCR识别）", "info");
    } else {
      addBotMessage("正在调用OCR识别发票，请稍候...");
    }
    try {
      var statusResp = await fetch("/api/ocr/status");
      var statusData = statusResp.ok ? await statusResp.json() : { configured: false };

      if (statusData.configured) {
        var resp = await fetch("/api/ocr", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ imageBase64: uploadedFileBase64, fileType: uploadedFileType || "image/jpeg" })
        });
        if (resp.ok) {
          var result = await resp.json();
          if (result.ok && result.data) {
            var ocrFields = result.data;
            Object.keys(ocrFields).forEach(function(key) {
              if (ocrFields[key]) data[key] = ocrFields[key];
            });
            ocrUsedRealApi = true;
            console.log("[OCR] 识别成功，提取字段:", Object.keys(ocrFields));
          } else {
            showToast("OCR识别未返回有效数据，使用模拟数据填充", "warning");
            console.warn("[OCR] 未返回有效数据:", result.error || "未知错误");
          }
        } else {
          var errResult = {};
          try { errResult = await resp.json(); } catch(e) {}
          var errMsg = errResult.error || "未知错误";
          showToast("OCR识别失败: " + errMsg, "error");
          console.error("[OCR] HTTP", resp.status, errMsg);
        }
      } else {
        showToast("OCR服务未配置真实密钥，使用演示数据", "warning");
        console.warn("[OCR] AppCode未配置，使用演示数据");
      }
    } catch(e) {
      if (e.message.indexOf("Failed to fetch") >= 0 || e.message.indexOf("NetworkError") >= 0 || location.protocol === 'file:') {
        if (location.protocol !== 'file:') {
          showToast("无法连接OCR服务，请确保后端服务已启动 (node server.js)", "warning");
        }
        console.warn("[OCR] 后端服务未启动，使用模拟数据");
      } else {
        showToast("OCR调用异常: " + e.message, "error");
        console.error("[OCR] 异常:", e.message);
      }
    }
    uploadedFileBase64 = null;
    uploadedFileType = null;
  } else if (isApiConfigured("ocr")) {
    try {
      var result2 = await callConfiguredApi("ocr", {expenseType:type});
      if (result2.ok && result2.data) data = Object.assign({}, data, result2.data);
    } catch(e) {}
  }

  // 用 OCR 真实字段覆盖 mock 数据
  currentOcrData = data;

  // 基于真实 OCR 数据推断报销业务字段（仅覆盖可推断的字段）
  if (ocrUsedRealApi) {
    if (data.remark) {
      // 从备注提取航班信息 → 城市推断
      var flightMatch = data.remark.match(/航班[：:](.*?)[;；]|航班[：:](.*?)$/);
      if (flightMatch) {
        var route = (flightMatch[1] || flightMatch[2] || '').trim();
        var cityMatch = route.match(/([^\s]+?)[\-→—](.+)/);
        if (cityMatch) currentOcrData.city = cityMatch[1].trim() + "→" + cityMatch[2].trim();
      }
      // 从备注提取乘机人
      var paxMatch = data.remark.match(/乘机人[：:](.*?)[;；]/);
      if (paxMatch) currentOcrData.participants = paxMatch[1].trim();
    }
    // 从发票类型推断费用类型
    if (data.invoiceTypeDetected || data.invoiceType) {
      var itype = (data.invoiceTypeDetected || data.invoiceType || '').toLowerCase();
      if (itype.indexOf('机票') >= 0 || itype.indexOf('运输') >= 0 || itype.indexOf('航空') >= 0 || itype.indexOf('代理') >= 0) {
        currentOcrData.expenseType = '差旅交通费';
      } else if (itype.indexOf('住宿') >= 0 || itype.indexOf('酒店') >= 0) {
        currentOcrData.expenseType = '住宿费';
      } else if (itype.indexOf('餐饮') >= 0) {
        currentOcrData.expenseType = '客户招待费';
      }
    }
    // 从备注或销方名称推断用途
    if (data.sellerName) {
      var sname = data.sellerName;
      if (sname.indexOf('旅行社') >= 0 || sname.indexOf('航空') >= 0 || sname.indexOf('铁路') >= 0) {
        currentOcrData.purpose = '差旅交通';
      } else if (sname.indexOf('酒店') >= 0 || sname.indexOf('住宿') >= 0) {
        currentOcrData.purpose = '出差住宿';
      }
    }
    // 从开票日期推断费用发生日期
    if (data.invoiceDate) {
      currentOcrData.expenseDate = data.invoiceDate.replace(/年/g, '-').replace(/月/g, '-').replace(/日/g, '');
    }
    // 系统匹配字段：优先用当前选中用户，否则用默认用户(张伟)填充
    fillSystemFields(currentOcrData);
    currentOcrData.tripCode = '';
    currentOcrData.clientName = '';
  }
  currentFlowStep = 2;
  var tag = ocrUsedRealApi ? ' <span style="color:#27ae60;font-size:12px;">(真实识别)</span>' : ' <span style="color:#e67e22;font-size:12px;">(演示数据)</span>';
  var html = "<b>OCR 识别完成</b>" + tag + "，请确认以下字段信息：";
  var card = createOcrCard(data);
  var bubble = addBotMessage(html, card);
  bubble.insertBefore(createStepIndicator(2), bubble.firstChild);
}

var MISSING_FIELD_MAP = {
  "参与人员名单":"participants","参与人员":"participants",
  "项目编号":"tripCode","项目归属":"tripCode",
  "超标特殊审批说明":"purpose","超标说明":"purpose",

  "差旅申请单":"tripCode",
  "人均金额说明":"purpose",
  "招待事由":"purpose",
  "验收单":"purpose"
};
var RULE_FIELD_MAP = {
  "R001":["amount","totalAmount"],
  "R006":["tripCode","costCenter"],
  "R007":["hasPreApplication"]
};

function getHighlightFields(item) {
  var fields = {};
  (item.missing||[]).forEach(function(m){
    Object.keys(MISSING_FIELD_MAP).forEach(function(k){
      if (m.indexOf(k) >= 0) fields[MISSING_FIELD_MAP[k]] = true;
    });
  });
  (item.hitRules||[]).forEach(function(r){
    Object.keys(RULE_FIELD_MAP).forEach(function(k){
      if (r.indexOf(k) >= 0) RULE_FIELD_MAP[k].forEach(function(f){ fields[f]=true; });
    });
  });
  return Object.keys(fields);
}

// 已上传的附件存储: { attachmentName: { fileName, fileSize, uploadTime } }
var uploadedAttachments = {};
// 当前等待上传的附件名称
var pendingAttachmentName = null;

function checkAttachments() {
  currentFlowStep = 4;
  var checklist = ATTACHMENT_CHECKLISTS[currentExpenseType] || [];

  // 重置所有附件状态为"缺失"，仅发票标记为"已上传"（OCR已识别）
  checklist.forEach(function(item) {
    if (item.name === "发票") {
      item.status = "已上传";
      item.reason = "OCR已识别发票信息";
      item.action = "";
    } else {
      var key = currentExpenseType + ":" + item.name;
      if (uploadedAttachments[key]) {
        item.status = "已上传";
        item.reason = "已上传: " + uploadedAttachments[key].fileName;
        item.action = "";
      } else {
        item.status = "缺失";
        item.reason = "未上传" + item.name;
        item.action = "点击上传";
      }
    }
  });

  var card = document.createElement("div");
  card.className = "attachment-card";
  card.id = "attachmentCard";
  card.innerHTML = "<h4>📎 附件完整性检查</h4>";
  checklist.forEach(function(item, idx){
    var statusClass = (item.status==="已上传"||item.status==="已确认")?"status-pass":item.status==="缺失"?"status-confirm":"status-remind";
    var div = document.createElement("div");
    div.className = "attach-item";
    div.id = "attach-item-" + idx;

    // 附件名称
    var nameSpan = document.createElement("span");
    nameSpan.className = "attach-name";
    nameSpan.textContent = item.name;

    // 状态
    var statusSpan = document.createElement("span");
    statusSpan.className = "attach-status " + statusClass;
    statusSpan.id = "attach-status-" + idx;
    statusSpan.textContent = item.status;

    // 必填/选填
    var reqSpan = document.createElement("span");
    reqSpan.className = "attach-required";
    reqSpan.textContent = item.required ? "必填" : "选填";

    // 原因
    var reasonSpan = document.createElement("span");
    reasonSpan.className = "attach-reason";
    reasonSpan.id = "attach-reason-" + idx;
    reasonSpan.textContent = item.reason || "—";

    // 操作按钮
    var actionSpan = document.createElement("span");
    actionSpan.className = "attach-action";
    actionSpan.id = "attach-action-" + idx;
    if (item.status === "已上传" || item.status === "已确认") {
      actionSpan.innerHTML = '<span style="color:#27ae60;">✓</span>';
    } else {
      var btn = document.createElement("button");
      btn.style.cssText = "padding:3px 10px;border:1px solid var(--primary);border-radius:4px;background:transparent;color:var(--primary);font-size:12px;cursor:pointer;";
      btn.textContent = item.action || "上传";
      btn.onclick = (function(n, i) {
        return function() { triggerAttachmentUpload(n, i); };
      })(item.name, idx);
      actionSpan.appendChild(btn);
    }

    div.appendChild(nameSpan);
    div.appendChild(statusSpan);
    div.appendChild(reqSpan);
    div.appendChild(reasonSpan);
    div.appendChild(actionSpan);
    card.appendChild(div);
  });

  var missing = checklist.filter(function(c){ return c.required && c.status==="缺失"; });
  var summaryDiv = document.createElement("div");
  summaryDiv.id = "attachSummary";
  if (missing.length > 0) {
    summaryDiv.style.cssText = "margin-top:10px;padding:8px 12px;background:#fef3c7;border-radius:6px;font-size:13px;color:#b45309;";
    summaryDiv.innerHTML = '⚠ 缺失 '+missing.length+' 项必填材料: '+missing.map(function(m){return m.name;}).join("、");
  } else {
    summaryDiv.style.cssText = "margin-top:10px;padding:8px 12px;background:#dcfce7;border-radius:6px;font-size:13px;color:#15803d;";
    summaryDiv.innerHTML = '✓ 必填材料齐全';
  }
  card.appendChild(summaryDiv);

  var btnDiv = document.createElement("div");
  btnDiv.style.cssText = "margin-top:12px;";
  var precheckBtn = document.createElement("button");
  precheckBtn.className = "btn btn-primary";
  precheckBtn.id = "btnRunPrecheck";
  precheckBtn.textContent = "运行预审";
  precheckBtn.onclick = function(){ runPrecheck(); };
  btnDiv.appendChild(precheckBtn);
  card.appendChild(btnDiv);

  var bubble = addBotMessage("", card);
  bubble.insertBefore(createStepIndicator(4), bubble.firstChild);
}

function triggerAttachmentUpload(attachName, attachIdx) {
  pendingAttachmentName = attachName;
  var input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*,.pdf,.doc,.docx,.xls,.xlsx,.jpg,.jpeg,.png";
  input.style.display = "none";
  input.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    handleAttachmentFile(attachName, attachIdx, file);
    document.body.removeChild(input);
  };
  document.body.appendChild(input);
  input.click();
}

function handleAttachmentFile(attachName, attachIdx, file) {
  var key = currentExpenseType + ":" + attachName;
  var fileSize = file.size < 1024*1024 ? (file.size/1024).toFixed(1)+"KB" : (file.size/1024/1024).toFixed(1)+"MB";
  var uploadTime = new Date().toLocaleTimeString();

  // 存储附件信息
  uploadedAttachments[key] = {
    fileName: file.name,
    fileSize: fileSize,
    uploadTime: uploadTime
  };

  // 更新 ATTACHMENT_CHECKLISTS 状态
  var checklist = ATTACHMENT_CHECKLISTS[currentExpenseType];
  if (checklist) {
    checklist.forEach(function(item) {
      if (item.name === attachName) {
        item.status = "已上传";
        item.reason = "已上传: " + file.name + " (" + fileSize + ")";
        item.action = "";
      }
    });
  }

  // 更新 UI：状态、原因、操作按钮
  var statusEl = document.getElementById("attach-status-" + attachIdx);
  if (statusEl) {
    statusEl.textContent = "已上传";
    statusEl.className = "attach-status status-pass";
  }
  var reasonEl = document.getElementById("attach-reason-" + attachIdx);
  if (reasonEl) {
    reasonEl.textContent = "已上传: " + file.name + " (" + fileSize + ")";
  }
  var actionEl = document.getElementById("attach-action-" + attachIdx);
  if (actionEl) {
    actionEl.innerHTML = '<span style="color:#27ae60;">✓</span>';
  }

  // 更新摘要
  var missing = (checklist || []).filter(function(c){ return c.required && c.status==="缺失"; });
  var summaryEl = document.getElementById("attachSummary");
  if (summaryEl) {
    if (missing.length > 0) {
      summaryEl.style.cssText = "margin-top:10px;padding:8px 12px;background:#fef3c7;border-radius:6px;font-size:13px;color:#b45309;";
      summaryEl.innerHTML = '⚠ 缺失 '+missing.length+' 项必填材料: '+missing.map(function(m){return m.name;}).join("、");
    } else {
      summaryEl.style.cssText = "margin-top:10px;padding:8px 12px;background:#dcfce7;border-radius:6px;font-size:13px;color:#15803d;";
      summaryEl.innerHTML = '✓ 必填材料齐全';
    }
  }

  showToast(attachName + " 已上传: " + file.name, "success");
  pendingAttachmentName = null;
}

function handleAttachAction(name, action) {
